      async function probeUrl(url) {
        var parsed = new URL(url, location.href);
        if (!/^https?:$/.test(parsed.protocol)) throw new Error("поддерживаются только HTTP- и HTTPS-ссылки");
        var controller = new AbortController();
        var timer = window.setTimeout(function () { controller.abort(); }, 12000);
        try {
          var response = await fetch(parsed.href, { method: "HEAD", cache: "no-store", credentials: "include", signal: controller.signal });
          if (response.status === 405 || response.status === 501) {
            response = await fetch(parsed.href, { method: "GET", cache: "no-store", credentials: "include", signal: controller.signal });
            if (response.body) response.body.cancel();
          }
          if (!response.ok) throw new Error("HTTP " + response.status);
          return response;
        } finally {
          window.clearTimeout(timer);
        }
      }

      async function checkKfoSourceConnection(source) {
        if (!source.url) {
          state.sourceConnections[source.id] = { status: "inactive", checkedAt: new Date(), message: "Ссылка на БД КФО не указана" };
          return false;
        }
        state.sourceConnections[source.id] = { status: "checking", checkedAt: new Date(), message: "Проверяем доступность источника…" };
        try {
          await probeUrl(source.url);
          state.sourceConnections[source.id] = { status: "active", checkedAt: new Date(), message: "Файл найден и доступен" };
          return true;
        } catch (error) {
          var message = error && error.name === "AbortError" ? "Превышено время ожидания ответа" : (error.message || "Файл не найден");
          state.sourceConnections[source.id] = { status: "error", checkedAt: new Date(), message: message };
          return false;
        }
      }

      async function checkKfoConnections(quiet) {
        var sources = getKfoSources().filter(function (source) { return source.enabled; });
        if (!sources.length) {
          if (!quiet) showToast("Нет источников", "Добавьте хотя бы одну БД КФО в режиме редактирования.");
          return false;
        }
        sources.forEach(function (source) { state.sourceConnections[source.id] = { status: "checking", checkedAt: new Date(), message: "Проверяем доступность источника…" }; });
        refreshConnectionElements();
        var results = await Promise.all(sources.map(checkKfoSourceConnection));
        refreshConnectionElements();
        var active = results.filter(Boolean).length;
        state.connection = { status: active ? "active" : "inactive", checkedAt: new Date(), message: active + " из " + sources.length + " источников доступно" };
        if (!quiet) showToast(active ? "Проверка завершена" : "Нет подключения", state.connection.message);
        return active > 0;
      }

      async function refreshKfoData() {
        var dateInput = document.getElementById("as-of-date");
        if (dateInput) state.asOfDate = dateInput.value || state.asOfDate;
        var levelInput = document.getElementById("kq-level");
        if (levelInput) state.kqLevel = levelInput.value === "kq1" ? "kq1" : "kq2";
        state.calculationMode = "with-regulations";
        await loadKfoSources();
      }

      function columnLetterToIndex(value) {
        var text = String(value || "").replace(/\$/g, "").trim().toUpperCase();
        if (!/^[A-Z]+$/.test(text)) return -1;
        var result = 0;
        for (var index = 0; index < text.length; index += 1) result = result * 26 + text.charCodeAt(index) - 64;
        return result - 1;
      }

      function readSheetCell(sheet, rowIndex, columnIndex) {
        if (!sheet || rowIndex < 0 || columnIndex < 0) return "";
        var dense = sheet["!data"];
        var cell = dense ? ((dense[rowIndex] || [])[columnIndex]) : sheet[XLSX.utils.encode_cell({ r: rowIndex, c: columnIndex })];
        return cell && cell.v != null ? cell.v : "";
      }

      function readSheetAddress(sheet, address) {
        try {
          var decoded = XLSX.utils.decode_cell(String(address || "A1"));
          return readSheetCell(sheet, decoded.r, decoded.c);
        } catch (error) {
          return "";
        }
      }

      function parseExcelDate(value) {
        if (value instanceof Date && !Number.isNaN(value.getTime())) return value.toISOString().slice(0, 10);
        if (typeof value === "number" && Number.isFinite(value) && value > 0) {
          var parsed = XLSX.SSF && XLSX.SSF.parse_date_code ? XLSX.SSF.parse_date_code(value) : null;
          if (parsed && parsed.y && parsed.m && parsed.d) return [parsed.y, String(parsed.m).padStart(2, "0"), String(parsed.d).padStart(2, "0")].join("-");
        }
        var text = String(value == null ? "" : value).trim();
        var ru = /^(\d{1,2})[.\/-](\d{1,2})[.\/-](\d{4})$/.exec(text);
        if (ru) return [ru[3], ru[2].padStart(2, "0"), ru[1].padStart(2, "0")].join("-");
        var iso = /^(\d{4})-(\d{2})-(\d{2})/.exec(text);
        if (iso) return iso[1] + "-" + iso[2] + "-" + iso[3];
        var date = new Date(text);
        return Number.isNaN(date.getTime()) ? "" : date.toISOString().slice(0, 10);
      }

      function parseKfoNumber(value, fallback) {
        if (typeof value === "number") return Number.isFinite(value) ? value : (fallback == null ? 0 : fallback);
        var normalized = String(value == null ? "" : value).replace(/[\s\u00a0]/g, "").replace(",", ".");
        if (!normalized) return fallback == null ? 0 : fallback;
        var result = Number(normalized);
        return Number.isFinite(result) ? result : (fallback == null ? 0 : fallback);
      }

      function resolveParserColumns(sheet, parser, sourceColumns, searchRows) {
        var reference = XLSX.utils.decode_range(sheet["!ref"] || "A1:A1");
        var fields = Object.keys(parser.fields || {});
        var headerIndex = -1;
        var resolved = {};
        var maximumRows = Math.min(reference.e.r + 1, Math.max(1, Math.min(Number(searchRows) || parser.headerSearchRows || 50, 500)));
        for (var rowIndex = 0; rowIndex < maximumRows; rowIndex += 1) {
          var candidate = {};
          fields.forEach(function (field) {
            var aliases = (parser.fields[field].aliases || []).map(normalizeParserLabel);
            for (var columnIndex = reference.s.c; columnIndex <= reference.e.c; columnIndex += 1) {
              if (aliases.indexOf(normalizeParserLabel(readSheetCell(sheet, rowIndex, columnIndex))) >= 0) { candidate[field] = columnIndex; break; }
            }
          });
          var ready = fields.filter(function (field) { return parser.fields[field].required; }).every(function (field) { return candidate[field] !== undefined; });
          if (ready) { headerIndex = rowIndex; resolved = candidate; break; }
        }
        if (headerIndex < 0) throw new Error("не найдена строка заголовков обязательных полей");
        fields.forEach(function (field) {
          if (resolved[field] !== undefined) return;
          var fallback = sourceColumns && sourceColumns[field] ? sourceColumns[field] : parser.fields[field].fallbackColumn;
          var fallbackIndex = columnLetterToIndex(fallback);
          if (fallbackIndex >= 0) resolved[field] = fallbackIndex;
        });
        return { headerIndex: headerIndex, columns: resolved, lastRow: reference.e.r };
      }

      function getWorkbookSheet(workbook, preferredName, aliases) {
        var names = [preferredName].concat(aliases || []).filter(Boolean);
        for (var index = 0; index < names.length; index += 1) {
          var exact = workbook.SheetNames.find(function (name) { return normalizeParserLabel(name) === normalizeParserLabel(names[index]); });
          if (exact) return { name: exact, sheet: workbook.Sheets[exact] };
        }
        return null;
      }

      function findRegulationRule(rules, markCode, contractor, contractNumber) {
        var candidates = rules.get(normalizeParserLabel(markCode)) || [];
        var contractorKey = normalizeParserLabel(contractor);
        var contractKey = normalizeParserLabel(contractNumber);
        var matches = candidates.map(function (rule) {
          var ruleContractor = normalizeParserLabel(rule.contractor);
          var ruleContract = normalizeParserLabel(rule.contractNumber);
          if (ruleContractor && ruleContractor !== contractorKey) return null;
          if (ruleContract && ruleContract !== contractKey) return null;
          return { rule: rule, score: (ruleContractor ? 4 : 0) + (ruleContract ? 2 : 0) };
        }).filter(Boolean).sort(function (a, b) { return b.score - a.score; });
        return matches.length ? matches[0].rule : null;
      }

      function regulationCoefficient(rule, field) {
        var value = Number(rule && rule[field]);
        return Number.isFinite(value) ? value : 0;
      }

      function resolveKqName(erCode, level, kqCode, erName) {
        var rule = state.aggregation.index && state.aggregation.index.get(normalizeParserLabel(erCode));
        if (!rule) return normalizeParserLabel(erCode) === normalizeParserLabel(kqCode) ? (erName || kqCode) : kqCode;
        var codeField = level === "kq1" ? "kq1Code" : "kq2Code";
        var nameField = level === "kq1" ? "kq1Name" : "kq2Name";
        return normalizeParserLabel(rule[codeField]) === normalizeParserLabel(kqCode) ? (rule[nameField] || kqCode) : kqCode;
      }

      function analyzeKqControlSheet(workbook) {
        var selected = getWorkbookSheet(workbook, "KQ", ["KQ"]);
        if (!selected) return { rows: 0, uniqueEr: 0, duplicates: 0 };
        var reference = XLSX.utils.decode_range(selected.sheet["!ref"] || "A1:A1");
        var seen = new Set();
        var rows = 0;
        var duplicates = 0;
        for (var rowIndex = reference.s.r + 1; rowIndex <= reference.e.r; rowIndex += 1) {
          var erCode = String(readSheetCell(selected.sheet, rowIndex, 0) || "").trim();
          if (!erCode) continue;
          rows += 1;
          var key = normalizeParserLabel(erCode);
          if (seen.has(key)) duplicates += 1; else seen.add(key);
        }
        return { rows: rows, uniqueEr: seen.size, duplicates: duplicates };
      }

      function parseKfoWorkbook(buffer, source, parserConfig) {
        if (!window.XLSX) throw new Error("Библиотека чтения Excel не загрузилась");
        var sheetSelection = [source.sheetName, "KQ"].filter(Boolean);
        var workbook = XLSX.read(buffer, { type: "array", dense: true, cellDates: true, sheets: sheetSelection });
        var parser = parserConfig.parsers && parserConfig.parsers.kfo;
        if (!parser) throw new Error("в JSON-конфигураторе отсутствует parsers.kfo");
        var selected = getWorkbookSheet(workbook, source.sheetName, parser.sheetAliases);
        if (!selected) throw new Error("лист «" + source.sheetName + "» не найден");
        var resolved = resolveParserColumns(selected.sheet, parser, source.columns, source.headerSearchRows);
        var regulationRules = state.regulations.status === "active" && state.regulations.rules instanceof Map ? state.regulations.rules : new Map();
        var level = source.kqLevel === "kq1" || source.kqLevel === "kq2" ? source.kqLevel : state.kqLevel;
        var mode = "with-regulations";
        var groups = new Map();
        var detectedContractors = new Map();
        var diagnostics = { totalRows: 0, includedRows: 0, dateExcludedRows: 0, futureFactRows: 0, missingContractorRows: 0, missingKqRows: 0, missingRegulationRows: 0, regulationMatchedRows: 0, zeroVolumeRows: 0 };
        var maximumRowDate = "";
        for (var rowIndex = resolved.headerIndex + 1; rowIndex <= resolved.lastRow; rowIndex += 1) {
          var get = function (field) { return resolved.columns[field] === undefined ? "" : readSheetCell(selected.sheet, rowIndex, resolved.columns[field]); };
          var erCode = String(get("erCode") || "").trim();
          var contractor = String(get("contractor") || "").trim();
          if (!erCode && !contractor) continue;
          diagnostics.totalRows += 1;
          if (contractor) {
            var detectedKey = normalizeParserLabel(contractor);
            var detected = detectedContractors.get(detectedKey) || { name: contractor, rows: 0 };
            detected.rows += 1;
            detectedContractors.set(detectedKey, detected);
          }
          if (!erCode || !contractor) { diagnostics.missingContractorRows += 1; continue; }
          var rowDate = parseExcelDate(get("rowDate"));
          if (rowDate && (!maximumRowDate || rowDate > maximumRowDate)) maximumRowDate = rowDate;
          if (state.asOfDate && rowDate && rowDate > state.asOfDate) { diagnostics.dateExcludedRows += 1; continue; }
          var lastFactDate = parseExcelDate(get("lastFactDate"));
          var actualSmr = parseKfoNumber(get("actualSmr"), 0);
          if (state.asOfDate && lastFactDate && lastFactDate > state.asOfDate) { actualSmr = 0; diagnostics.futureFactRows += 1; }
          var acceptedSk = parseKfoNumber(get("acceptedSk"), 0);
          var acceptedId = parseKfoNumber(get("acceptedId"), 0);
          if (actualSmr === 0 && acceptedSk === 0 && acceptedId === 0) { diagnostics.zeroVolumeRows += 1; continue; }
          var codeField = level === "kq1" ? "kq1Code" : "kq2Code";
          var coefficientField = level === "kq1" ? "kq1Coefficient" : "kq2Coefficient";
          var kqCode = String(get(codeField) || "").trim();
          var kqCoefficient = parseKfoNumber(get(coefficientField), 1);
          if (!kqCode) { kqCode = erCode; kqCoefficient = 1; diagnostics.missingKqRows += 1; }
          var rule = findRegulationRule(regulationRules, String(get("markCode") || "").trim(), contractor, String(get("contractNumber") || "").trim());
          if (rule) diagnostics.regulationMatchedRows += 1; else diagnostics.missingRegulationRows += 1;
          var actualCalculated = actualSmr * kqCoefficient;
          var skCalculated = acceptedSk * kqCoefficient;
          var idCalculated = acceptedId * kqCoefficient;
          var regulationEvaluation = rule
            ? actualCalculated * regulationCoefficient(rule, "actualSmr") + skCalculated * regulationCoefficient(rule, "acceptedSk") + idCalculated * regulationCoefficient(rule, "acceptedId")
            : 0;
          var unit = String(get("unit") || "").trim() || "без ед. изм.";
          var groupKey = [source.id, normalizeParserLabel(contractor), normalizeParserLabel(kqCode), normalizeParserLabel(unit), level, mode].join("||");
          var group = groups.get(groupKey);
          if (!group) {
            group = { sourceId: source.id, sourceName: source.name, contractor: contractor, kqCode: kqCode, kqName: resolveKqName(erCode, level, kqCode, String(get("erName") || "").trim()), erName: String(get("erName") || "").trim(), unit: unit, level: level, mode: mode, rows: 0, regulationRows: 0, actualSmr: 0, acceptedSk: 0, acceptedId: 0, evaluatedVolume: 0 };
            groups.set(groupKey, group);
          }
          group.rows += 1;
          if (rule) group.regulationRows += 1;
          group.actualSmr += actualCalculated;
          group.acceptedSk += skCalculated;
          group.acceptedId += idCalculated;
          group.evaluatedVolume += regulationEvaluation;
          diagnostics.includedRows += 1;
        }
        var updatedAtCell = source.updatedAtCell || parser.updatedAtCell;
        var configuredUpdatedAt = parseExcelDate(readSheetAddress(selected.sheet, updatedAtCell));
        var updatedAt = configuredUpdatedAt || maximumRowDate;
        var updatedAtOrigin = configuredUpdatedAt ? "ячейка " + updatedAtCell : "максимальная дата строк";
        var outputGroups = Array.from(groups.values()).sort(function (a, b) { return a.contractor.localeCompare(b.contractor, "ru") || a.kqCode.localeCompare(b.kqCode, "ru") || a.unit.localeCompare(b.unit, "ru"); });
        var coverageBase = diagnostics.regulationMatchedRows + diagnostics.missingRegulationRows;
        return {
          groups: outputGroups,
          summary: { id: source.id, name: source.name, sheetName: selected.name, updatedAt: updatedAt, updatedAtOrigin: updatedAtOrigin, totalRows: diagnostics.totalRows, includedRows: diagnostics.includedRows, groupCount: outputGroups.length, contractors: Array.from(detectedContractors.values()), regulationCoverage: coverageBase ? diagnostics.regulationMatchedRows / coverageBase * 100 : null, diagnostics: diagnostics, kqControl: analyzeKqControlSheet(workbook) }
        };
      }

      async function fetchWorkbookBuffer(url) {
        var parsed = new URL(url, location.href);
        if (!/^https?:$/.test(parsed.protocol)) throw new Error("поддерживаются только HTTP- и HTTPS-ссылки");
        var controller = new AbortController();
        var timer = window.setTimeout(function () { controller.abort(); }, 120000);
        try {
          var response = await fetch(parsed.href, { cache: "no-store", credentials: "include", signal: controller.signal });
          if (!response.ok) throw new Error("HTTP " + response.status);
          return await response.arrayBuffer();
        } finally {
          window.clearTimeout(timer);
        }
      }

      function buildContractorSummaries(groups) {
        var map = new Map();
        groups.forEach(function (group) {
          var key = normalizeParserLabel(group.contractor);
          var entry = map.get(key);
          if (!entry) { entry = { name: group.contractor, rows: 0, workTypeSet: new Set(), unitSet: new Set(), regulationRows: 0, regulatedBase: 0 }; map.set(key, entry); }
          entry.rows += group.rows;
          entry.workTypeSet.add(workTypeKey(group));
          entry.unitSet.add(group.unit);
          if (group.mode === "with-regulations") { entry.regulationRows += group.regulationRows; entry.regulatedBase += group.rows; }
        });
        return Array.from(map.values()).map(function (entry) {
          return { name: entry.name, rows: entry.rows, workTypes: entry.workTypeSet.size, units: entry.unitSet.size, regulationCoverage: entry.regulatedBase ? entry.regulationRows / entry.regulatedBase * 100 : null };
        }).sort(function (a, b) { return a.name.localeCompare(b.name, "ru"); });
      }

      async function loadKfoSources() {
        var sources = getKfoSources().filter(function (source) { return source.enabled && source.url; });
        if (!sources.length) {
          state.kfo = { status: "error", groups: [], contractors: [], rawContractors: [], sourceSummaries: [], totalRows: 0, includedRows: 0, message: "Не указана ссылка ни на одну БД КФО" };
          renderContent();
          showToast("Сведения не обновлены", "Укажите ссылку SharePoint в режиме редактирования.");
          return false;
        }
        state.kfo = { status: "loading", groups: [], contractors: [], rawContractors: [], sourceSummaries: [], totalRows: 0, includedRows: 0, message: "Читаем источники…" };
        sources.forEach(function (source) { state.sourceConnections[source.id] = { status: "loading", checkedAt: new Date(), message: "Загружаем и разбираем Excel…" }; });
        renderContent();
        var parserConfig;
        try {
          parserConfig = await fetchParserConfiguration();
        } catch (error) {
          state.kfo.status = "error";
          state.kfo.message = error.message || "Не удалось загрузить JSON-конфигуратор";
          renderContent();
          showToast("Ошибка конфигурации БД КФО", state.kfo.message);
          return false;
        }
        var groups = [];
        var summaries = [];
        var errors = [];
        for (var index = 0; index < sources.length; index += 1) {
          var source = sources[index];
          try {
            var parsed = parseKfoWorkbook(await fetchWorkbookBuffer(source.url), source, parserConfig);
            groups = groups.concat(parsed.groups);
            summaries.push(parsed.summary);
            state.sourceConnections[source.id] = { status: "active", checkedAt: new Date(), message: "Проанализировано " + formatNumber(parsed.summary.totalRows, 0) + " строк; с объёмами — " + formatNumber(parsed.summary.includedRows, 0) };
          } catch (error) {
            var message = error && error.name === "AbortError" ? "Превышено время загрузки" : (error.message || "Ошибка чтения Excel");
            state.sourceConnections[source.id] = { status: "error", checkedAt: new Date(), message: message };
            errors.push(source.name + ": " + message);
          }
          renderContent();
        }
        state.dataUpdatedAt = new Date();
        var canonicalGroups = aggregateCanonicalGroups(groups);
        state.kfo = { status: summaries.length ? "active" : "error", groups: groups, contractors: buildContractorSummaries(canonicalGroups), rawContractors: combineDetectedContractors(summaries), sourceSummaries: summaries, totalRows: summaries.reduce(function (sum, entry) { return sum + entry.totalRows; }, 0), includedRows: summaries.reduce(function (sum, entry) { return sum + entry.includedRows; }, 0), message: errors.length ? errors.join("; ") : "Сведения загружены" };
        state.connection = { status: summaries.length ? "active" : "inactive", checkedAt: new Date(), message: summaries.length + " из " + sources.length + " источников обработано" };
        renderContent();
        showToast(summaries.length ? "Сведения БД КФО обновлены" : "Не удалось прочитать БД КФО", summaries.length ? ("Проанализировано строк: " + formatNumber(state.kfo.totalRows, 0) + ". Видов работ: " + formatNumber(countUniqueWorkTypes(groups), 0) + "." + (errors.length ? " Есть ошибки отдельных источников." : "")) : errors.join("; "));
        return summaries.length > 0;
      }

      async function checkConfigLocation() {
        var input = document.getElementById("setting-config-url");
        var url = input ? input.value.trim() : "";
        if (!url) {
          showToast("Адрес не указан", "Введите ссылку на config.json.");
          return;
        }
        try {
          var response = await fetch(new URL(url).href, { cache: "no-store", credentials: "include" });
          if (!response.ok) throw new Error("HTTP " + response.status);
          var config = await response.json();
          if (config.application !== "nzp-calculator") throw new Error("неверный формат config.json");
          showToast("Адрес config.json доступен", "Конфигурация версии " + (config.version || "без номера") + " успешно прочитана.");
        } catch (error) {
          showToast("config.json недоступен", error.message || "Не удалось прочитать файл.");
        }
      }

      function normalizeParserLabel(value) {
        return String(value == null ? "" : value).trim().replace(/\s+/g, " ").toLowerCase();
      }

      async function fetchParserConfiguration() {
        var url = state.config.parserConfigUrl || DEFAULT_CONFIG.parserConfigUrl;
        var localPreview = location.hostname === "127.0.0.1" || location.hostname === "localhost";
        if (localPreview && url === DEFAULT_CONFIG.parserConfigUrl) url = "./parser-config.json";
        var response = await fetch(new URL(url, location.href).href, { cache: "no-store", credentials: "include" });
        if (!response.ok) throw new Error("JSON-конфигуратор: HTTP " + response.status);
        var config = await response.json();
        if (!config || config.application !== "nzp-calculator" || !config.parsers || !config.parsers.aggregation) {
          throw new Error("неверная структура JSON-конфигуратора");
        }
        if (!config.parsers.kfo || !config.parsers.dk || !config.kfoLogic) {
          throw new Error("в конфигураторе не описаны parsers.kfo, parsers.dk и kfoLogic");
        }
        var aggregation = config.parsers.aggregation;
        if (!aggregation.fields || !Array.isArray(aggregation.recordRequiredFields)) {
          throw new Error("в конфигураторе не описаны поля парсера укрупнения");
        }
        if (!config.sources || !config.sources.aggregation || !config.sources.aggregation.url) {
          throw new Error("в конфигураторе не указана ссылка sources.aggregation.url");
        }
        if (!config.aggregationLogic || !config.aggregationLogic.activeLevel || !Array.isArray(config.sourcePriority)) {
          throw new Error("в конфигураторе не описаны aggregationLogic и sourcePriority");
        }
        config._sourceUrl = response.url || new URL(url, location.href).href;
        return config;
      }

      async function checkParserConfig(quiet) {
        try {
          var config = await fetchParserConfiguration();
          if (!quiet) showToast("Конфигуратор доступен", "Версия " + (config.version || "без номера") + " успешно прочитана.");
          return config;
        } catch (error) {
          if (!quiet) showToast("Ошибка конфигуратора", error.message || "Не удалось прочитать JSON.");
          throw error;
        }
      }

      function parseAggregationWorkbook(buffer, parser) {
        if (!window.XLSX) throw new Error("Библиотека чтения Excel не загрузилась");
        var workbook = XLSX.read(buffer, { type: "array" });
        var fieldNames = Object.keys(parser.fields || {});
        var searchRows = Math.max(1, Math.min(Number(parser.headerSearchRows) || 50, 500));
        for (var sheetIndex = 0; sheetIndex < workbook.SheetNames.length; sheetIndex += 1) {
          var sheet = workbook.Sheets[workbook.SheetNames[sheetIndex]];
          var data = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "", blankrows: false });
          var headerIndex = -1;
          var columns = {};
          for (var rowIndex = 0; rowIndex < Math.min(data.length, searchRows); rowIndex += 1) {
            var row = data[rowIndex] || [];
            columns = {};
            fieldNames.forEach(function (field) {
              var aliases = (parser.fields[field] && parser.fields[field].aliases) || [];
              var index = row.findIndex(function (cell) {
                return aliases.some(function (alias) { return normalizeParserLabel(alias) === normalizeParserLabel(cell); });
              });
              if (index >= 0) columns[field] = index;
            });
            var headersReady = fieldNames.filter(function (field) { return parser.fields[field].required; }).every(function (field) { return columns[field] !== undefined; });
            if (headersReady) { headerIndex = rowIndex; break; }
          }
          if (headerIndex < 0) continue;
          var entries = [];
          for (var dataIndex = headerIndex + 1; dataIndex < data.length; dataIndex += 1) {
            var sourceRow = data[dataIndex] || [];
            var getValue = function (field) { return columns[field] === undefined ? "" : sourceRow[columns[field]]; };
            var complete = parser.recordRequiredFields.every(function (field) { return String(getValue(field) == null ? "" : getValue(field)).trim(); });
            if (!complete) continue;
            var numeric = function (field) {
              var value = Number(String(getValue(field)).replace(/\s/g, "").replace(",", "."));
              return Number.isFinite(value) ? value : null;
            };
            var entry = {
              erCode: String(getValue("erCode")).trim(), erName: String(getValue("erName")).trim(), unit: String(getValue("unit")).trim(),
              kq0Code: String(getValue("kq0Code")).trim(), kq0Name: String(getValue("kq0Name")).trim(), kq0Coefficient: numeric("kq0Coefficient"),
              kq1Code: String(getValue("kq1Code")).trim(), kq1Name: String(getValue("kq1Name")).trim(), kq1Coefficient: numeric("kq1Coefficient"),
              kq2Code: String(getValue("kq2Code")).trim(), kq2Name: String(getValue("kq2Name")).trim(), kq2Coefficient: numeric("kq2Coefficient"),
              status: String(getValue("status") || parser.defaultStatus || "Действует").trim()
            };
            if (entry.kq0Coefficient === null || entry.kq1Coefficient === null || entry.kq2Coefficient === null) continue;
            entries.push(entry);
          }
          if (entries.length) return entries;
        }
        throw new Error("в Excel не найдена таблица, соответствующая JSON-конфигуратору");
      }

      function buildAggregationIndex(entries, config) {
        var logic = config.aggregationLogic || {};
        var matchField = logic.matchField || "erCode";
        var excluded = (logic.excludedStatuses || []).map(normalizeParserLabel);
        var index = new Map();
        entries.forEach(function (entry) {
          if (excluded.indexOf(normalizeParserLabel(entry.status)) >= 0) return;
          var key = normalizeParserLabel(entry[matchField]);
          if (key && !index.has(key)) index.set(key, entry);
        });
        return index;
      }

      function getEffectiveKq2Coefficient(rule, config) {
        var logic = config.aggregationLogic || {};
        var corrections = logic.coefficientCorrections || {};
        var byEr = corrections.byErCode || {};
        var byKq2 = corrections.byKq2Code || {};
        var erCode = String(rule.erCode || "");
        var kq2Code = String(rule.kq2Code || "");
        var corrected = byEr[erCode];
        if (corrected === undefined) corrected = byEr[normalizeParserLabel(erCode)];
        if (corrected === undefined) corrected = byKq2[kq2Code];
        if (corrected === undefined) corrected = byKq2[normalizeParserLabel(kq2Code)];
        var coefficient = corrected === undefined ? Number(rule.kq2Coefficient) : Number(corrected);
        return Number.isFinite(coefficient) ? coefficient : 1;
      }

      function getEffectiveAggregationGroup(level, sourceCode, sourceName, config) {
        var logic = config.aggregationLogic || {};
        var groups = (logic.groupCorrections || {})[level] || {};
        var correction = groups[sourceCode];
        if (correction === undefined) correction = groups[normalizeParserLabel(sourceCode)];
        if (correction === undefined) {
          return { code: sourceCode || "", name: sourceName || "", corrected: false };
        }
        if (typeof correction === "string") {
          return { code: sourceCode || "", name: correction, corrected: true };
        }
        return {
          code: correction.code || sourceCode || "",
          name: correction.name || sourceName || "",
          corrected: true
        };
      }

      function calculateByAggregationRule(quantity, rule, config) {
        var logic = config.aggregationLogic || {};
        var levelName = logic.activeLevel || "kq2";
        var level = (logic.levels || {})[levelName];
        if (!level || !rule) return { quantity: quantity, code: "", name: "", coefficient: 1, level: "er" };
        var coefficient = levelName === "kq2"
          ? getEffectiveKq2Coefficient(rule, config)
          : Number(level.coefficient == null ? 1 : level.coefficient);
        if (!Number.isFinite(coefficient)) coefficient = 1;
        var operation = (logic.quantityCalculation || {}).operation || "multiply";
        var result = operation === "multiply" ? Number(quantity) * coefficient : Number(quantity);
        var rounding = Number((logic.quantityCalculation || {}).rounding);
        if (Number.isInteger(rounding) && rounding >= 0 && rounding <= 12) result = Number(result.toFixed(rounding));
        var effectiveGroup = levelName === "kq1" || levelName === "kq2"
          ? getEffectiveAggregationGroup(levelName, rule[level.codeField], rule[level.nameField], config)
          : { code: rule[level.codeField] || "", name: rule[level.nameField] || "" };
        return { quantity: result, code: effectiveGroup.code, name: effectiveGroup.name, coefficient: coefficient, level: levelName };
      }

      function resolveAggregation(erCode, quantity, candidates) {
        var config = state.aggregation.parserConfig;
        if (!config) return { source: "source", quantity: quantity, code: erCode, name: "", coefficient: 1, level: "er" };
        var available = candidates || {};
        var priorities = config.sourcePriority.slice().sort(function (a, b) { return b.priority - a.priority; });
        for (var index = 0; index < priorities.length; index += 1) {
          var source = priorities[index].source;
          var externalRule = available[source];
          if (externalRule) return Object.assign({ source: source }, calculateByAggregationRule(quantity, externalRule, config));
          if (source === "aggregation") {
            var referenceRule = state.aggregation.index.get(normalizeParserLabel(erCode));
            if (referenceRule) return Object.assign({ source: "aggregation" }, calculateByAggregationRule(quantity, referenceRule, config));
          }
        }
        return { source: "source", quantity: quantity, code: erCode, name: "", coefficient: 1, level: "er" };
      }

      window.NZP_AGGREGATION_ENGINE = { resolve: resolveAggregation };

      async function loadAggregation(quiet) {
        var source = state.config.aggregationSource || DEFAULT_CONFIG.aggregationSource;
        state.aggregation.status = "loading";
        try {
          var parserConfig = await fetchParserConfiguration();
          var configuredSource = parserConfig.sources.aggregation.url || source.url;
          var response = await fetch(new URL(configuredSource, parserConfig._sourceUrl).href, { cache: "no-store", credentials: "include" });
          if (!response.ok) throw new Error("Справочник Excel: HTTP " + response.status);
          var entries = parseAggregationWorkbook(await response.arrayBuffer(), parserConfig.parsers.aggregation);
          state.aggregation = { status: "active", entries: entries, parserVersion: parserConfig.version || "", parserConfig: parserConfig, index: buildAggregationIndex(entries, parserConfig), message: "Справочник загружен" };
          renderContent();
          if (!quiet) showToast("Справочник загружен", "Прочитано " + entries.length + " строк ЕР.");
          return true;
        } catch (error) {
          state.aggregation = { status: "error", entries: [], parserVersion: "", parserConfig: null, index: new Map(), message: error.message || "Ошибка чтения справочника" };
          renderContent();
          if (!quiet) showToast("Ошибка справочника", state.aggregation.message);
          return false;
        }
      }

      function applySourceSettings() {
        var aggregationInput = document.getElementById("setting-aggregation-url");
        var parserInput = document.getElementById("setting-parser-config-url");
        var aggregationUrl = aggregationInput ? aggregationInput.value.trim() : "";
        var parserUrl = parserInput ? parserInput.value.trim() : DEFAULT_CONFIG.parserConfigUrl;
        try {
          if (aggregationUrl) aggregationUrl = new URL(aggregationUrl).href;
          parserUrl = new URL(parserUrl).href;
        } catch (error) {
          showToast("Некорректный адрес", "Укажите полные HTTP- или HTTPS-ссылки.");
          return;
        }
        state.config.aggregationSource = { name: "Справочник укрупнения", url: aggregationUrl };
        state.config.parserConfigUrl = parserUrl;
        state.configDirty = true;
        applyConfigToChrome();
        renderContent();
        showToast("Источники применены", "Ссылки включены в config.json.");
      }

      function applySettings() {
        var configUrlValue = document.getElementById("setting-config-url").value.trim() || DEFAULT_CONFIG.configUrl;
        try {
          configUrlValue = new URL(configUrlValue).href;
        } catch (error) {
          showToast("Некорректный адрес config.json", "Укажите полную HTTP- или HTTPS-ссылку.");
          return;
        }
        state.config.configUrl = configUrlValue;
        state.config.title = document.getElementById("setting-title").value.trim() || DEFAULT_CONFIG.title;
        state.config.version = document.getElementById("setting-version").value.trim() || DEFAULT_CONFIG.version;
        state.config.export = state.config.export || {};
        state.config.export.fileName = document.getElementById("setting-file").value.trim() || DEFAULT_CONFIG.export.fileName;
        state.config.export.sheetName = document.getElementById("setting-sheet").value.trim() || DEFAULT_CONFIG.export.sheetName;
        state.configDirty = true;
        localStorage.setItem(CONFIG_URL_KEY, state.config.configUrl);
        applyConfigToChrome();
        renderContent();
        showToast("Настройки применены", "Скачайте config.json и замените файл в репозитории или SharePoint.");
      }

      function applyConfigToChrome() {
        document.getElementById("app-title").textContent = state.config.title || DEFAULT_CONFIG.title;
        document.title = state.config.title || DEFAULT_CONFIG.title;
        document.getElementById("version-label").textContent = "Версия " + (state.config.version || DEFAULT_CONFIG.version);
        document.getElementById("footer-status").textContent = state.configDirty ? "Есть несохранённые изменения конфигурации" : "Изменения конфигурации отсутствуют";
      }

      function setEditMode(enabled, quiet) {
        var shouldDownloadConfig = state.editMode && !enabled && state.configDirty;
        state.editMode = Boolean(enabled);
        document.body.classList.toggle("edit-mode", state.editMode);
        document.getElementById("edit-mode").checked = state.editMode;
        renderContent();
        if (shouldDownloadConfig) {
          downloadConfig();
          if (!quiet) showToast("Режим просмотра включён", "Изменённый config.json сохранён в загрузках браузера для самостоятельной публикации.");
        } else if (!quiet) {
          showToast(state.editMode ? "Режим редактирования включён" : "Режим просмотра включён", state.editMode ? "Доступны элементы настройки конфигурации." : "Поля настроек защищены от изменений.");
        }
      }

      function setConfigStatus(type, message) {
        var node = document.getElementById("config-status");
        node.className = "status-chip edit-only " + (type || "");
        node.innerHTML = '<span class="status-dot"></span><span>' + escapeHtml(message) + '</span>';
      }

      async function loadConfig() {
        setConfigStatus("", "Загрузка конфигурации…");
        try {
          var localPreview = location.hostname === "127.0.0.1" || location.hostname === "localhost";
          var savedConfigUrl = localStorage.getItem(CONFIG_URL_KEY);
          var configUrl = savedConfigUrl || (localPreview ? "./config.json" : DEFAULT_CONFIG.configUrl);
          var requestUrl = new URL(configUrl, location.href);
          requestUrl.searchParams.set("ts", Date.now());
          var response = await fetch(requestUrl.href, { cache: "no-store", credentials: "include" });
          if (!response.ok) throw new Error("HTTP " + response.status);
          var incoming = await response.json();
          if (!incoming || incoming.application !== "nzp-calculator") throw new Error("неверный формат файла");
          state.config = Object.assign({}, DEFAULT_CONFIG, incoming, { export: Object.assign({}, DEFAULT_CONFIG.export, incoming.export || {}), calculation: Object.assign({}, DEFAULT_CONFIG.calculation, incoming.calculation || {}), contractorDirectory: normalizeContractorDirectory(incoming.contractorDirectory || DEFAULT_CONFIG.contractorDirectory) });
          state.config.configUrl = incoming.configUrl || requestUrl.origin + requestUrl.pathname;
          if (!Array.isArray(state.config.dataSources) || !state.config.dataSources.length) state.config.dataSources = JSON.parse(JSON.stringify(DEFAULT_CONFIG.dataSources));
          state.config.dataSources = getKfoSources();
          state.kqLevel = state.config.calculation.defaultKqLevel === "kq1" ? "kq1" : "kq2";
          state.calculationMode = "with-regulations";
          state.sourceConnections = {};
          state.config.dataSources.forEach(function (source) { state.sourceConnections[source.id] = { status: "inactive", checkedAt: null, message: source.url ? "Источник ещё не проверен" : "Ссылка на БД КФО не указана" }; });
          localStorage.setItem(CONFIG_URL_KEY, state.config.configUrl);
          state.configLoaded = true;
          state.configDirty = false;
          state.connection = { status: "inactive", checkedAt: null, message: getKfoSources().some(function (source) { return source.url; }) ? "Источники ещё не проверены" : "Ссылка на БД КФО не указана" };
          applyConfigToChrome();
          setConfigStatus("ok", "config.json подключён");
          setEditMode(Boolean(state.config.editMode), true);
          if (getKfoSources().some(function (source) { return source.url && source.enabled; })) checkKfoConnections(true);
          loadAggregation(true);
        } catch (error) {
          state.config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
          state.configLoaded = false;
          applyConfigToChrome();
          setConfigStatus("error", "Ошибка config.json");
          renderContent();
          showToast("Не удалось загрузить конфигурацию", error.message || "Неизвестная ошибка");
        }
      }

      function downloadConfig() {
        var output = Object.assign({}, state.config, { editMode: false, dataSources: getKfoSources(), calculation: { defaultKqLevel: state.kqLevel, defaultMode: "with-regulations" } });
        var blob = new Blob([JSON.stringify(output, null, 2) + "\n"], { type: "application/json;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var link = document.createElement("a");
        link.href = url;
        link.download = "config.json";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        state.configDirty = false;
        applyConfigToChrome();
        showToast("config.json сформирован", "Замените им файл в GitHub или SharePoint.");
      }

      function showToast(title, note) {
        var region = document.getElementById("toast-region");
        var node = document.createElement("div");
        node.className = "toast";
        node.innerHTML = ICONS.check + '<div><div class="toast-title">' + escapeHtml(title) + '</div><div class="toast-note">' + escapeHtml(note || "") + '</div></div>';
        region.appendChild(node);
        window.setTimeout(function () { node.remove(); }, 3800);
      }

      document.getElementById("nav-list").addEventListener("click", function (event) {
        var buttonNode = event.target.closest("[data-section]");
        if (!buttonNode) return;
        state.active = buttonNode.getAttribute("data-section");
        renderNav();
        renderContent();
        document.getElementById("main-scroll").scrollTop = 0;
      });
      document.getElementById("edit-mode").addEventListener("change", function (event) { setEditMode(event.target.checked, false); });
      document.getElementById("download-config").addEventListener("click", downloadConfig);

      decorateStaticIcons(document);
      renderNav();
      renderContent();
      loadConfig();
    }());
  </script>
</body>
