<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#289672" />
  <title>Отчёт по незавершённому строительству (НЗП)</title>
  <style>
    :root {
      color-scheme: light;
      --background: #f8faf9;
      --foreground: #17201c;
      --card: #ffffff;
      --card-foreground: #17201c;
      --primary: #289672;
      --primary-strong: #1f7a5d;
      --primary-soft: #e8f5f0;
      --primary-faint: #f4fbf8;
      --muted: #f1f4f3;
      --muted-foreground: #68736e;
      --accent: #e8eeeb;
      --border: #dce4e0;
      --danger: #b42318;
      --danger-soft: #fff0ee;
      --warning: #9a6700;
      --warning-soft: #fff8e6;
      --shadow: 0 8px 24px rgba(23, 49, 39, 0.06);
      --radius: 9px;
      font-family: "Segoe UI", Inter, Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--background); color: var(--foreground); }
    body { min-width: 320px; }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    button:focus-visible, input:focus-visible, select:focus-visible { outline: 3px solid rgba(40, 150, 114, .22); outline-offset: 2px; }
    svg { display: block; }

    .app-shell { width: 100%; min-height: 100vh; overflow-x: hidden; display: grid; grid-template-rows: 56px minmax(0, 1fr) 48px; }

    .app-header {
      position: sticky; top: 0; z-index: 30;
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
      padding: 0 20px; background: rgba(255, 255, 255, .96);
      border-bottom: 1px solid var(--border); box-shadow: 0 2px 10px rgba(27, 53, 43, .04);
      backdrop-filter: blur(10px);
    }
    .brand { min-width: 0; display: flex; align-items: center; gap: 11px; }
    .brand-mark { width: 34px; height: 34px; flex: 0 0 auto; display: grid; place-items: center; color: white; background: var(--primary); border-radius: 9px; box-shadow: 0 4px 10px rgba(40, 150, 114, .22); }
    .brand-copy { min-width: 0; }
    .brand-title { margin: 0; font-size: 17px; line-height: 1.2; font-weight: 650; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand-subtitle { display: none; color: var(--muted-foreground); font-size: 11px; margin-top: 2px; }
    .header-actions { display: flex; align-items: center; gap: 8px; }

    .status-chip { display: inline-flex; align-items: center; gap: 7px; min-height: 30px; padding: 0 10px; color: var(--muted-foreground); background: var(--muted); border: 1px solid var(--border); border-radius: 999px; font-size: 12px; white-space: nowrap; }
    .status-chip.ok { color: var(--primary-strong); background: var(--primary-soft); border-color: rgba(40, 150, 114, .24); }
    .status-chip.error { color: var(--danger); background: var(--danger-soft); border-color: rgba(180, 35, 24, .2); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

    .workspace { min-height: 0; display: grid; grid-template-columns: 256px minmax(0, 1fr); }
    .sidebar { min-width: 0; overflow-y: auto; background: #f5f8f6; border-right: 1px solid var(--border); }
    .sidebar-label { margin: 18px 14px 8px; color: var(--muted-foreground); font-size: 10px; font-weight: 650; letter-spacing: .1em; text-transform: uppercase; }
    .nav-list { display: flex; flex-direction: column; gap: 2px; padding: 0 8px 16px; }
    .nav-item { width: 100%; display: flex; align-items: center; gap: 11px; min-height: 42px; padding: 9px 11px; color: #34423c; background: transparent; border: 0; border-radius: 7px; text-align: left; font-size: 13px; font-weight: 550; transition: background .16s ease, color .16s ease; }
    .nav-item:hover { background: rgba(40, 150, 114, .07); }
    .nav-item.active { color: var(--primary-strong); background: rgba(40, 150, 114, .1); }
    .nav-icon { width: 18px; height: 18px; flex: 0 0 auto; color: var(--primary); }
    .nav-text { line-height: 1.25; }

    .content-scroll { min-width: 0; overflow: auto; }
    .content { width: min(1120px, 100%); margin: 0 auto; padding: 30px 30px 42px; }
    .page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 22px; }
    .page-title-row { display: flex; align-items: center; gap: 10px; }
    .page-icon { width: 23px; height: 23px; color: var(--primary); }
    .page-title { margin: 0; font-size: 21px; line-height: 1.25; font-weight: 650; }
    .page-description { max-width: 720px; margin: 6px 0 0 33px; color: var(--muted-foreground); font-size: 13px; line-height: 1.5; }
    .page-actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }

    .btn { min-height: 34px; display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 7px 12px; color: #34423c; background: var(--card); border: 1px solid var(--border); border-radius: 7px; font-size: 12px; font-weight: 600; transition: background .16s, border-color .16s, color .16s; }
    .btn:hover { background: var(--muted); border-color: #cbd7d1; }
    .btn-primary { color: white; background: var(--primary); border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-strong); border-color: var(--primary-strong); }
    .btn-ghost { background: transparent; border-color: transparent; }
    .btn:disabled { cursor: not-allowed; opacity: .46; }
    .btn svg { width: 15px; height: 15px; }

    .stack { display: grid; gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .card { min-width: 0; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 1px 2px rgba(20, 40, 32, .02); }
    .card-header { padding: 18px 18px 0; }
    .card-title-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .card-title { margin: 0; font-size: 14px; font-weight: 650; }
    .card-desc { margin: 5px 0 0; color: var(--muted-foreground); font-size: 12px; line-height: 1.5; }
    .card-body { padding: 16px 18px 18px; }
    .card-footer { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding: 12px 18px; background: #fbfcfb; border-top: 1px solid var(--border); border-radius: 0 0 var(--radius) var(--radius); }

    .banner { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; color: #44524c; background: var(--primary-faint); border: 1px solid rgba(40, 150, 114, .18); border-radius: 8px; font-size: 12px; line-height: 1.45; }
    .banner svg { width: 17px; height: 17px; flex: 0 0 auto; color: var(--primary); margin-top: 1px; }
    .banner.warning { background: var(--warning-soft); border-color: rgba(154, 103, 0, .18); }
    .banner.warning svg { color: var(--warning); }

    .badge { display: inline-flex; align-items: center; gap: 5px; min-height: 23px; padding: 3px 8px; color: #4c5a54; background: var(--muted); border: 1px solid var(--border); border-radius: 999px; font-size: 10px; font-weight: 650; white-space: nowrap; }
    .badge.green { color: var(--primary-strong); background: var(--primary-soft); border-color: rgba(40, 150, 114, .2); }
    .badge.warning { color: var(--warning); background: var(--warning-soft); border-color: rgba(154, 103, 0, .18); }

    .upload-zone { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 190px; padding: 24px; color: var(--muted-foreground); background: #f9fbfa; border: 2px dashed #cbd7d1; border-radius: 9px; text-align: center; transition: border-color .16s, background .16s; }
    .upload-zone:hover, .upload-zone.dragging { background: var(--primary-faint); border-color: var(--primary); }
    .upload-zone input { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .upload-mark { width: 42px; height: 42px; display: grid; place-items: center; margin-bottom: 11px; color: var(--primary); background: var(--primary-soft); border-radius: 50%; }
    .upload-mark svg { width: 20px; height: 20px; }
    .upload-title { color: var(--foreground); font-size: 13px; font-weight: 650; }
    .upload-note { max-width: 340px; margin-top: 5px; font-size: 11px; line-height: 1.45; }

    .source-list { display: grid; gap: 8px; }
    .source-row { display: flex; align-items: center; gap: 11px; padding: 11px; background: #fbfcfb; border: 1px solid var(--border); border-radius: 7px; }
    .source-icon { width: 32px; height: 32px; flex: 0 0 auto; display: grid; place-items: center; color: var(--primary); background: var(--primary-soft); border-radius: 7px; }
    .source-icon svg { width: 16px; height: 16px; }
    .source-copy { min-width: 0; flex: 1; }
    .source-name { overflow: hidden; color: var(--foreground); font-size: 12px; font-weight: 600; text-overflow: ellipsis; white-space: nowrap; }
    .source-meta { overflow: hidden; margin-top: 2px; color: var(--muted-foreground); font-size: 10px; text-overflow: ellipsis; white-space: nowrap; }

    .connection-summary { display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 14px; background: #fafcfb; border: 1px solid var(--border); border-radius: 8px; }
    .connection-main { min-width: 0; display: flex; align-items: center; gap: 11px; }
    .connection-light { width: 34px; height: 34px; flex: 0 0 auto; display: grid; place-items: center; color: var(--danger); background: var(--danger-soft); border-radius: 50%; }
    .connection-light.active { color: var(--primary-strong); background: var(--primary-soft); }
    .connection-light svg { width: 17px; height: 17px; }
    .connection-title { color: var(--foreground); font-size: 12px; font-weight: 650; }
    .connection-note { margin-top: 3px; color: var(--muted-foreground); font-size: 10px; line-height: 1.4; }
    .connection-date { flex: 0 0 auto; color: var(--muted-foreground); font-size: 10px; text-align: right; }
    .form-actions { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 10px; }
    .form-actions .field { min-width: min(100%, 210px); flex: 1; }

    .empty { min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 9px; padding: 28px; color: var(--muted-foreground); background: #fafcfb; border: 1px dashed var(--border); border-radius: 8px; text-align: center; }
    .empty-icon { width: 42px; height: 42px; display: grid; place-items: center; color: var(--muted-foreground); background: var(--muted); border-radius: 50%; }
    .empty-icon svg { width: 19px; height: 19px; }
    .empty-title { color: #3e4b45; font-size: 12px; font-weight: 650; }
    .empty-note { max-width: 420px; font-size: 11px; line-height: 1.45; }

    .stat { padding: 15px; background: #fafcfb; border: 1px solid var(--border); border-radius: 8px; }
    .stat.highlight { background: var(--primary-faint); border-color: rgba(40, 150, 114, .2); }
    .stat-label { color: var(--muted-foreground); font-size: 11px; }
    .stat-value { margin-top: 6px; color: var(--foreground); font-size: 20px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat.highlight .stat-value { color: var(--primary-strong); }
    .stat-note { margin-top: 3px; color: var(--muted-foreground); font-size: 10px; }

    .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    th { padding: 10px 12px; color: var(--muted-foreground); background: #f6f8f7; border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 650; letter-spacing: .05em; text-align: left; text-transform: uppercase; white-space: nowrap; }
    td { padding: 11px 12px; border-bottom: 1px solid #e9eeeb; }
    tbody tr:last-child td { border-bottom: 0; }
    tbody tr:hover td { background: #fbfcfb; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .muted { color: var(--muted-foreground); }

    .field-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 13px; }
    .field { display: grid; gap: 6px; }
    .field-wide { grid-column: 1 / -1; }
    .field label { color: #44524c; font-size: 11px; font-weight: 600; }
    .input { width: 100%; min-height: 36px; padding: 7px 10px; color: var(--foreground); background: white; border: 1px solid var(--border); border-radius: 7px; font-size: 12px; }
    .input:disabled { color: var(--muted-foreground); background: var(--muted); }

    .edit-only { display: none !important; }
    body.edit-mode .edit-only { display: inline-flex !important; }
    body.edit-mode .edit-only.block { display: flex !important; }
    body.edit-mode .editable-card { border-color: rgba(40, 150, 114, .32); box-shadow: 0 0 0 2px rgba(40, 150, 114, .05); }

    .app-footer { position: sticky; bottom: 0; z-index: 30; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 0 18px; color: var(--muted-foreground); background: rgba(255, 255, 255, .97); border-top: 1px solid var(--border); box-shadow: 0 -3px 14px rgba(27, 53, 43, .04); backdrop-filter: blur(10px); font-size: 11px; }
    .footer-part { min-width: 0; display: flex; align-items: center; gap: 10px; }
    .footer-center { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .edit-toggle { display: inline-flex; align-items: center; gap: 9px; color: #405048; font-size: 12px; font-weight: 600; user-select: none; cursor: pointer; }
    .edit-toggle input { position: absolute; opacity: 0; pointer-events: none; }
    .switch { width: 36px; height: 20px; position: relative; flex: 0 0 auto; background: #cbd5d0; border-radius: 999px; transition: background .18s; }
    .switch::after { content: ""; position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; background: white; border-radius: 50%; box-shadow: 0 1px 3px rgba(0, 0, 0, .2); transition: transform .18s; }
    .edit-toggle input:checked + .switch { background: var(--primary); }
    .edit-toggle input:checked + .switch::after { transform: translateX(16px); }
    .edit-toggle input:focus-visible + .switch { outline: 3px solid rgba(40, 150, 114, .22); outline-offset: 2px; }

    .toast-region { position: fixed; z-index: 100; top: 70px; right: 18px; display: grid; gap: 8px; pointer-events: none; }
    .toast { width: min(360px, calc(100vw - 36px)); display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; color: var(--card-foreground); background: var(--card); border: 1px solid var(--border); border-radius: 9px; box-shadow: var(--shadow); animation: toast-in .2s ease-out; pointer-events: auto; }
    .toast svg { width: 17px; height: 17px; flex: 0 0 auto; color: var(--primary); }
    .toast-title { font-size: 12px; font-weight: 650; }
    .toast-note { margin-top: 2px; color: var(--muted-foreground); font-size: 10px; line-height: 1.4; }
    @keyframes toast-in { from { opacity: 0; transform: translateY(-6px); } }

    @media (max-width: 900px) {
      .app-shell { grid-template-rows: 56px auto minmax(0, 1fr) 52px; }
      .workspace { display: contents; }
      .sidebar { width: 100%; max-width: 100vw; overflow: hidden; border-right: 0; border-bottom: 1px solid var(--border); }
      .sidebar-label { display: none; }
      .nav-list { width: 100%; max-width: 100vw; overflow-x: auto; flex-direction: row; padding: 7px 10px; }
      .nav-item { width: auto; min-width: max-content; min-height: 38px; padding: 8px 10px; }
      .nav-text { white-space: nowrap; }
      .content-scroll { min-height: 0; }
      .content { padding: 24px 20px 34px; }
      .grid-3 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .footer-center { display: none; }
    }

    @media (max-width: 680px) {
      .app-header { padding: 0 12px; }
      .brand-title { font-size: 14px; }
      .header-actions .btn, body.edit-mode .header-actions .btn { display: none !important; }
      .status-chip { max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
      .content { padding: 20px 14px 30px; }
      .page-head { display: grid; }
      .page-actions { justify-content: flex-start; }
      .page-description { margin-left: 0; }
      .grid-2, .grid-3, .field-grid { grid-template-columns: 1fr; }
      .field-wide { grid-column: auto; }
      .connection-summary { align-items: flex-start; flex-direction: column; }
      .connection-date { text-align: left; }
      .app-footer { padding: 0 12px; }
      .footer-part:first-child { display: none; }
      .footer-part:last-child { margin-left: auto; }
      .nav-icon { width: 16px; height: 16px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true" data-icon="file-chart"></div>
        <div class="brand-copy">
          <h1 class="brand-title" id="app-title">Отчёт по незавершённому строительству (НЗП)</h1>
          <div class="brand-subtitle">Расчёт и подготовка отчётности</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost edit-only" type="button" id="download-config" data-icon-button="download">Скачать config.json</button>
        <div class="status-chip" id="config-status"><span class="status-dot"></span><span>Загрузка конфигурации…</span></div>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar" aria-label="Разделы приложения">
        <div class="sidebar-label">Разделы</div>
        <nav class="nav-list" id="nav-list"></nav>
      </aside>
      <main class="content-scroll" id="main-scroll">
        <div class="content" id="content" aria-live="polite"></div>
      </main>
    </div>

    <footer class="app-footer">
      <div class="footer-part"><span id="version-label">Версия 0.3</span></div>
      <div class="footer-center" id="footer-status">Изменения конфигурации отсутствуют</div>
      <div class="footer-part">
        <label class="edit-toggle" for="edit-mode">
          <span>Режим редактирования</span>
          <input id="edit-mode" type="checkbox" />
          <span class="switch" aria-hidden="true"></span>
        </label>
      </div>
    </footer>
  </div>
  <div class="toast-region" id="toast-region" aria-live="polite"></div>

  <script>
    (function () {
      "use strict";

      var ICONS = {
        "file-chart": '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 18v-2M12 18v-4M16 18v-6"/></svg>',
        upload: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>',
        sliders: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="4" y1="21" x2="4" y2="14"/><line x1="4" y1="10" x2="4" y2="3"/><line x1="12" y1="21" x2="12" y2="12"/><line x1="12" y1="8" x2="12" y2="3"/><line x1="20" y1="21" x2="20" y2="16"/><line x1="20" y1="12" x2="20" y2="3"/><line x1="1" y1="14" x2="7" y2="14"/><line x1="9" y1="8" x2="15" y2="8"/><line x1="17" y1="16" x2="23" y2="16"/></svg>',
        calculator: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="8" y1="10" x2="8" y2="10"/><line x1="12" y1="10" x2="12" y2="10"/><line x1="16" y1="10" x2="16" y2="10"/><line x1="8" y1="14" x2="8" y2="14"/><line x1="12" y1="14" x2="12" y2="14"/><line x1="16" y1="14" x2="16" y2="18"/><line x1="8" y1="18" x2="8" y2="18"/><line x1="12" y1="18" x2="12" y2="18"/></svg>',

      function bindContentEvents() {
        var kfoUrl = document.getElementById("kfo-url");
        if (kfoUrl) {
          kfoUrl.addEventListener("input", function () {
            setKfoUrl(kfoUrl.value);
            state.connection = { status: "inactive", checkedAt: null, message: "Изменённая ссылка ещё не проверена" };
            state.configDirty = true;
            applyConfigToChrome();
            refreshConnectionElements();
          });
          kfoUrl.addEventListener("change", function () { checkKfoConnection(false); });
        }
        var checkKfo = document.getElementById("check-kfo");
        if (checkKfo) checkKfo.addEventListener("click", function () { checkKfoConnection(false); });
        var asOfDate = document.getElementById("as-of-date");
        if (asOfDate) asOfDate.addEventListener("change", function () { state.asOfDate = asOfDate.value || new Date().toISOString().slice(0, 10); });
        var refreshKfo = document.getElementById("refresh-kfo-data");
        if (refreshKfo) refreshKfo.addEventListener("click", refreshKfoData);

        if (adminDownload) adminDownload.addEventListener("click", downloadConfig);
        var apply = document.getElementById("apply-settings");
        if (apply) apply.addEventListener("click", applySettings);
        var checkConfig = document.getElementById("check-config-url");
        if (checkConfig) checkConfig.addEventListener("click", checkConfigLocation);
        document.querySelectorAll("[data-demo-action]").forEach(function (node) {
          node.addEventListener("click", function () { showToast("Элемент интерфейса готов", "Функциональная логика будет подключена на следующем этапе."); });
        });
      }

      function setKfoUrl(url) {

      function formatDateTime(value) {
        var date = value instanceof Date ? value : new Date(value);
        if (Number.isNaN(date.getTime())) return "—";
        return new Intl.DateTimeFormat("ru-RU", { dateStyle: "short", timeStyle: "medium" }).format(date);
      }

      function formatDateShort(value) {
        var date = new Date(String(value || "") + "T00:00:00");
        if (Number.isNaN(date.getTime())) return "—";
        return new Intl.DateTimeFormat("ru-RU").format(date);
      }

      function refreshConnectionElements() {
        var badge = document.getElementById("kfo-status-badge");
        if (badge) {
          var active = state.connection.status === "active";
          badge.className = "badge " + (active ? "green" : "warning");
          badge.textContent = active ? "Активно" : "Нет подключения";
        }
        var summary = document.getElementById("connection-summary");
        if (summary) summary.outerHTML = connectionSummary();
      }

      async function probeUrl(url) {
        var parsed = new URL(url);
        if (!/^https?:$/.test(parsed.protocol)) throw new Error("поддерживаются только HTTP- и HTTPS-ссылки");
        var controller = new AbortController();
        var timer = window.setTimeout(function () { controller.abort(); }, 12000);
        try {
          var response = await fetch(parsed.href, { method: "HEAD", cache: "no-store", credentials: "include", signal: controller.signal });
          if (response.status === 405 || response.status === 501) {
            response = await fetch(parsed.href, { method: "GET", cache: "no-store", credentials: "include", signal: controller.signal });
            if (response.body) response.body.cancel();
          }
          if (!response.ok) throw new Error("HTTP " + response.status);
          return response;
        } finally {
          window.clearTimeout(timer);
        }
      }

      async function checkKfoConnection(quiet) {
        var source = getKfoSource();
        if (!source.url) {
          state.connection = { status: "inactive", checkedAt: new Date(), message: "Ссылка на БД КФО не указана" };
          refreshConnectionElements();
          if (!quiet) showToast("Нет подключения", "Укажите ссылку на БД КФО в режиме редактирования.");
          return false;
        }
        state.connection = { status: "checking", checkedAt: new Date(), message: "Проверяем доступность источника…" };
        refreshConnectionElements();
        try {
          await probeUrl(source.url);
          state.connection = { status: "active", checkedAt: new Date(), message: "Файл БД КФО найден и доступен" };
          refreshConnectionElements();
          if (!quiet) showToast("Подключение активно", "БД КФО доступна. Время проверки: " + formatDateTime(state.connection.checkedAt));
          return true;
        } catch (error) {
          var message = error && error.name === "AbortError" ? "Превышено время ожидания ответа" : (error.message || "Файл не найден");
          state.connection = { status: "inactive", checkedAt: new Date(), message: message };
          refreshConnectionElements();
          if (!quiet) showToast("Нет подключения", message);
          return false;
        }
      }

      async function refreshKfoData() {
        var dateInput = document.getElementById("as-of-date");
        if (dateInput) state.asOfDate = dateInput.value || state.asOfDate;
        var connected = await checkKfoConnection(true);
        if (!connected) {
          showToast("Сведения не обновлены", "Нет подключения к БД КФО.");
          return;
        }
        state.dataUpdatedAt = new Date();
        renderContent();
        showToast("Источник проверен", "Подключение активно. Обработка сведений на " + formatDateShort(state.asOfDate) + " будет добавлена следующим этапом.");
      }

      async function checkConfigLocation() {
        var input = document.getElementById("setting-config-url");
        var url = input ? input.value.trim() : "";
        if (!url) {
          showToast("Адрес не указан", "Введите ссылку на config.json.");
          return;
        }
        try {
          var response = await fetch(new URL(url).href, { cache: "no-store", credentials: "include" });
          if (!response.ok) throw new Error("HTTP " + response.status);
          var config = await response.json();
          if (config.application !== "nzp-calculator") throw new Error("неверный формат config.json");
          showToast("Адрес config.json доступен", "Конфигурация версии " + (config.version || "без номера") + " успешно прочитана.");
        } catch (error) {
          showToast("config.json недоступен", error.message || "Не удалось прочитать файл.");
        }
      }

      function applySettings() {
        var configUrlValue = document.getElementById("setting-config-url").value.trim() || DEFAULT_CONFIG.configUrl;
        try {
          configUrlValue = new URL(configUrlValue).href;
        } catch (error) {
          showToast("Некорректный адрес config.json", "Укажите полную HTTP- или HTTPS-ссылку.");
          return;
        }
        state.config.configUrl = configUrlValue;
        state.config.title = document.getElementById("setting-title").value.trim() || DEFAULT_CONFIG.title;
        state.config.version = document.getElementById("setting-version").value.trim() || DEFAULT_CONFIG.version;
        state.config.export = state.config.export || {};
        state.config.export.fileName = document.getElementById("setting-file").value.trim() || DEFAULT_CONFIG.export.fileName;
        state.config.export.sheetName = document.getElementById("setting-sheet").value.trim() || DEFAULT_CONFIG.export.sheetName;
        state.configDirty = true;
        localStorage.setItem(CONFIG_URL_KEY, state.config.configUrl);
        applyConfigToChrome();
        renderContent();
        showToast("Настройки применены", "Скачайте config.json и замените файл в репозитории или SharePoint.");
      }

      function applyConfigToChrome() {
        document.getElementById("app-title").textContent = state.config.title || DEFAULT_CONFIG.title;
        document.title = state.config.title || DEFAULT_CONFIG.title;
        document.getElementById("version-label").textContent = "Версия " + (state.config.version || DEFAULT_CONFIG.version);
        document.getElementById("footer-status").textContent = state.configDirty ? "Есть несохранённые изменения конфигурации" : "Изменения конфигурации отсутствуют";
      }

      function setEditMode(enabled, quiet) {
        state.editMode = Boolean(enabled);
        document.body.classList.toggle("edit-mode", state.editMode);
        document.getElementById("edit-mode").checked = state.editMode;
        renderContent();
        if (!quiet) showToast(state.editMode ? "Режим редактирования включён" : "Режим просмотра включён", state.editMode ? "Доступны элементы настройки конфигурации." : "Поля настроек защищены от изменений.");
      }

      function setConfigStatus(type, message) {
        var node = document.getElementById("config-status");
        node.className = "status-chip " + (type || "");
        node.innerHTML = '<span class="status-dot"></span><span>' + escapeHtml(message) + '</span>';
      }

      async function loadConfig() {
        setConfigStatus("", "Загрузка конфигурации…");
        try {
          var localPreview = location.hostname === "127.0.0.1" || location.hostname === "localhost";
          var savedConfigUrl = localStorage.getItem(CONFIG_URL_KEY);
          var configUrl = savedConfigUrl || (localPreview ? "./config.json" : DEFAULT_CONFIG.configUrl);
          var requestUrl = new URL(configUrl, location.href);
          requestUrl.searchParams.set("ts", Date.now());
          var response = await fetch(requestUrl.href, { cache: "no-store", credentials: "include" });
          if (!response.ok) throw new Error("HTTP " + response.status);
          var incoming = await response.json();
          if (!incoming || incoming.application !== "nzp-calculator") throw new Error("неверный формат файла");
          state.config = Object.assign({}, DEFAULT_CONFIG, incoming, { export: Object.assign({}, DEFAULT_CONFIG.export, incoming.export || {}) });
          state.config.configUrl = incoming.configUrl || requestUrl.origin + requestUrl.pathname;
          if (!Array.isArray(state.config.dataSources) || !state.config.dataSources.length) state.config.dataSources = JSON.parse(JSON.stringify(DEFAULT_CONFIG.dataSources));
          localStorage.setItem(CONFIG_URL_KEY, state.config.configUrl);
          state.configLoaded = true;
          state.configDirty = false;
          state.connection = { status: "inactive", checkedAt: null, message: getKfoSource().url ? "Источник ещё не проверен" : "Ссылка на БД КФО не указана" };
          applyConfigToChrome();
          setConfigStatus("ok", "config.json подключён");
          setEditMode(Boolean(state.config.editMode), true);
          if (getKfoSource().url) checkKfoConnection(true);
        } catch (error) {
          state.config = JSON.parse(JSON.stringify(DEFAULT_CONFIG));
          state.configLoaded = false;
          applyConfigToChrome();
          setConfigStatus("error", "Ошибка config.json");
          renderContent();
          showToast("Не удалось загрузить конфигурацию", error.message || "Неизвестная ошибка");
        }
      }

      function downloadConfig() {
        var output = Object.assign({}, state.config, { editMode: false });
        var blob = new Blob([JSON.stringify(output, null, 2) + "\n"], { type: "application/json;charset=utf-8" });
        var url = URL.createObjectURL(blob);
        var link = document.createElement("a");
        link.href = url;
        link.download = "config.json";
        document.body.appendChild(link);
        link.click();
        link.remove();
        URL.revokeObjectURL(url);
        state.configDirty = false;
        applyConfigToChrome();
        showToast("config.json сформирован", "Замените им файл в GitHub или SharePoint.");
      }

      function showToast(title, note) {
        var region = document.getElementById("toast-region");
        var node = document.createElement("div");
        node.className = "toast";
        node.innerHTML = ICONS.check + '<div><div class="toast-title">' + escapeHtml(title) + '</div><div class="toast-note">' + escapeHtml(note || "") + '</div></div>';
        region.appendChild(node);
        window.setTimeout(function () { node.remove(); }, 3800);
      }

      document.getElementById("nav-list").addEventListener("click", function (event) {
        var buttonNode = event.target.closest("[data-section]");
        if (!buttonNode) return;
        state.active = buttonNode.getAttribute("data-section");
        renderNav();
        renderContent();
        document.getElementById("main-scroll").scrollTop = 0;
      });
      document.getElementById("edit-mode").addEventListener("change", function (event) { setEditMode(event.target.checked, false); });
      document.getElementById("download-config").addEventListener("click", downloadConfig);

      decorateStaticIcons(document);
      renderNav();
      renderContent();
      loadConfig();
    }());
  </script>
</body>
</html>
