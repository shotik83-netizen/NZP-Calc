<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#289672" />
  <title>Отчёт по незавершённому строительству (НЗП)</title>
  <style>
    :root {
      color-scheme: light;
      --background: #f8faf9;
      --foreground: #17201c;
      --card: #ffffff;
      --card-foreground: #17201c;
      --primary: #289672;
      --primary-strong: #1f7a5d;
      --primary-soft: #e8f5f0;
      --primary-faint: #f4fbf8;
      --muted: #f1f4f3;
      --muted-foreground: #68736e;
      --accent: #e8eeeb;
      --border: #dce4e0;
      --danger: #b42318;
      --danger-soft: #fff0ee;
      --warning: #9a6700;
      --warning-soft: #fff8e6;
      --shadow: 0 8px 24px rgba(23, 49, 39, 0.06);
      --radius: 9px;
      font-family: "Segoe UI", Inter, Arial, sans-serif;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; background: var(--background); color: var(--foreground); }
    body { min-width: 320px; overflow: hidden; }
    button, input, select { font: inherit; }
    button { cursor: pointer; }
    button:focus-visible, input:focus-visible, select:focus-visible { outline: 3px solid rgba(40, 150, 114, .22); outline-offset: 2px; }
    svg { display: block; }

    .app-shell { width: 100%; height: 100vh; height: 100dvh; min-height: 0; overflow: hidden; display: grid; grid-template-rows: 56px minmax(0, 1fr) 48px; }

    .app-header {
      position: sticky; top: 0; z-index: 30;
      display: flex; align-items: center; justify-content: space-between; gap: 20px;
      padding: 0 20px; background: rgba(255, 255, 255, .96);
      border-bottom: 1px solid var(--border); box-shadow: 0 2px 10px rgba(27, 53, 43, .04);
      backdrop-filter: blur(10px);
    }
    .brand { min-width: 0; display: flex; align-items: center; gap: 11px; }
    .brand-mark { width: 34px; height: 34px; flex: 0 0 auto; display: grid; place-items: center; color: white; background: var(--primary); border-radius: 9px; box-shadow: 0 4px 10px rgba(40, 150, 114, .22); }
    .brand-copy { min-width: 0; }
    .brand-title { margin: 0; font-size: 17px; line-height: 1.2; font-weight: 650; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .brand-subtitle { display: none; color: var(--muted-foreground); font-size: 11px; margin-top: 2px; }
    .header-actions { display: flex; align-items: center; gap: 8px; }

    .status-chip { display: inline-flex; align-items: center; gap: 7px; min-height: 30px; padding: 0 10px; color: var(--muted-foreground); background: var(--muted); border: 1px solid var(--border); border-radius: 999px; font-size: 12px; white-space: nowrap; }
    .status-chip.ok { color: var(--primary-strong); background: var(--primary-soft); border-color: rgba(40, 150, 114, .24); }
    .status-chip.error { color: var(--danger); background: var(--danger-soft); border-color: rgba(180, 35, 24, .2); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }

    .workspace { min-height: 0; display: grid; grid-template-columns: 256px minmax(0, 1fr); }
    .sidebar { min-width: 0; overflow-y: auto; background: #f5f8f6; border-right: 1px solid var(--border); }
    .sidebar-label { margin: 18px 14px 8px; color: var(--muted-foreground); font-size: 10px; font-weight: 650; letter-spacing: .1em; text-transform: uppercase; }
    .nav-list { display: flex; flex-direction: column; gap: 2px; padding: 0 8px 16px; }
    .nav-item { width: 100%; display: flex; align-items: center; gap: 11px; min-height: 42px; padding: 9px 11px; color: #34423c; background: transparent; border: 0; border-radius: 7px; text-align: left; font-size: 13px; font-weight: 550; transition: background .16s ease, color .16s ease; }
    .nav-item:hover { background: rgba(40, 150, 114, .07); }
    .nav-item.active { color: var(--primary-strong); background: rgba(40, 150, 114, .1); }
    .nav-icon { width: 18px; height: 18px; flex: 0 0 auto; color: var(--primary); }
    .nav-text { line-height: 1.25; }

    .content-scroll { min-width: 0; overflow: auto; }
    .content { width: min(1120px, 100%); margin: 0 auto; padding: 30px 30px 42px; }
    .page-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 20px; margin-bottom: 22px; }
    .page-title-row { display: flex; align-items: center; gap: 10px; }
    .page-icon { width: 23px; height: 23px; color: var(--primary); }
    .page-title { margin: 0; font-size: 21px; line-height: 1.25; font-weight: 650; }
    .page-description { max-width: 720px; margin: 6px 0 0 33px; color: var(--muted-foreground); font-size: 13px; line-height: 1.5; }
    .page-actions { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 8px; }

    .btn { min-height: 34px; display: inline-flex; align-items: center; justify-content: center; gap: 7px; padding: 7px 12px; color: #34423c; background: var(--card); border: 1px solid var(--border); border-radius: 7px; font-size: 12px; font-weight: 600; transition: background .16s, border-color .16s, color .16s; }
    .btn:hover { background: var(--muted); border-color: #cbd7d1; }
    .btn-primary { color: white; background: var(--primary); border-color: var(--primary); }
    .btn-primary:hover { background: var(--primary-strong); border-color: var(--primary-strong); }
    .btn-ghost { background: transparent; border-color: transparent; }
    .btn:disabled { cursor: not-allowed; opacity: .46; }
    .btn svg { width: 15px; height: 15px; }

    .stack { display: grid; gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 14px; }
    .card { min-width: 0; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: 0 1px 2px rgba(20, 40, 32, .02); }
    .card-header { padding: 18px 18px 0; }
    .card-title-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .card-title { margin: 0; font-size: 14px; font-weight: 650; }
    .card-desc { margin: 5px 0 0; color: var(--muted-foreground); font-size: 12px; line-height: 1.5; }
    .card-body { padding: 16px 18px 18px; }
    .card-footer { display: flex; align-items: center; justify-content: flex-end; gap: 8px; padding: 12px 18px; background: #fbfcfb; border-top: 1px solid var(--border); border-radius: 0 0 var(--radius) var(--radius); }

    .banner { display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; color: #44524c; background: var(--primary-faint); border: 1px solid rgba(40, 150, 114, .18); border-radius: 8px; font-size: 12px; line-height: 1.45; }
    .banner svg { width: 17px; height: 17px; flex: 0 0 auto; color: var(--primary); margin-top: 1px; }
    .banner.warning { background: var(--warning-soft); border-color: rgba(154, 103, 0, .18); }
    .banner.warning svg { color: var(--warning); }
    .banner-action { margin-left: auto; flex: 0 0 auto; }

    .badge { display: inline-flex; align-items: center; gap: 5px; min-height: 23px; padding: 3px 8px; color: #4c5a54; background: var(--muted); border: 1px solid var(--border); border-radius: 999px; font-size: 10px; font-weight: 650; white-space: nowrap; }
    .badge.green { color: var(--primary-strong); background: var(--primary-soft); border-color: rgba(40, 150, 114, .2); }
    .badge.warning { color: var(--warning); background: var(--warning-soft); border-color: rgba(154, 103, 0, .18); }

    .upload-zone { position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 190px; padding: 24px; color: var(--muted-foreground); background: #f9fbfa; border: 2px dashed #cbd7d1; border-radius: 9px; text-align: center; transition: border-color .16s, background .16s; }
    .upload-zone:hover, .upload-zone.dragging { background: var(--primary-faint); border-color: var(--primary); }
    .upload-zone input { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0; cursor: pointer; }
    .upload-mark { width: 42px; height: 42px; display: grid; place-items: center; margin-bottom: 11px; color: var(--primary); background: var(--primary-soft); border-radius: 50%; }
    .upload-mark svg { width: 20px; height: 20px; }
    .upload-title { color: var(--foreground); font-size: 13px; font-weight: 650; }
    .upload-note { max-width: 340px; margin-top: 5px; font-size: 11px; line-height: 1.45; }

    .source-list { display: grid; gap: 8px; }
    .source-row { display: flex; align-items: center; gap: 11px; padding: 11px; background: #fbfcfb; border: 1px solid var(--border); border-radius: 7px; }
    .source-icon { width: 32px; height: 32px; flex: 0 0 auto; display: grid; place-items: center; color: var(--primary); background: var(--primary-soft); border-radius: 7px; }
    .source-icon svg { width: 16px; height: 16px; }
    .source-copy { min-width: 0; flex: 1; }
    .source-name { overflow: hidden; color: var(--foreground); font-size: 12px; font-weight: 600; text-overflow: ellipsis; white-space: nowrap; }
    .source-meta { overflow: hidden; margin-top: 2px; color: var(--muted-foreground); font-size: 10px; text-overflow: ellipsis; white-space: nowrap; }
    .source-grid { display: grid; gap: 12px; }
    .source-card { overflow: hidden; background: #fbfcfb; border: 1px solid var(--border); border-radius: 8px; }
    .source-overview { min-height: 46px; display: grid; grid-template-columns: minmax(90px, 1fr) auto minmax(190px, auto) auto auto; align-items: center; gap: 14px; padding: 9px 12px; }
    .source-overview-name { min-width: 0; overflow: hidden; color: var(--foreground); font-size: 12px; font-weight: 650; text-overflow: ellipsis; white-space: nowrap; }
    .source-status-inline { display: inline-flex; align-items: center; gap: 6px; color: var(--danger); font-size: 10px; font-weight: 650; white-space: nowrap; }
    .source-status-inline.active { color: var(--primary-strong); }
    .source-status-dot { width: 7px; height: 7px; flex: 0 0 auto; background: currentColor; border-radius: 50%; }
    .source-overview-metric { min-width: 0; overflow: hidden; color: var(--muted-foreground); font-size: 10px; text-overflow: ellipsis; white-space: nowrap; }
    .source-overview-metric strong { color: #44524c; font-weight: 700; font-variant-numeric: tabular-nums; }
    .source-overview-date { color: var(--muted-foreground); font-size: 10px; font-variant-numeric: tabular-nums; white-space: nowrap; }
    .source-overview-date strong { color: #44524c; font-weight: 650; }
    .source-overview-actions { display: inline-flex; align-items: center; gap: 6px; white-space: nowrap; }
    .source-open-link { color: var(--primary-strong); font-size: 10px; font-weight: 650; text-decoration: none; white-space: nowrap; }
    .source-open-link:hover { text-decoration: underline; }
    .source-settings { margin: 0 12px 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .settings-section-title { margin: 16px 0 4px; color: var(--foreground); font-size: 12px; font-weight: 650; }
    .settings-section-note { margin: 0; color: var(--muted-foreground); font-size: 10px; line-height: 1.45; }
    .mapping-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 10px; margin-top: 12px; }
    .mapping-grid .input { text-transform: uppercase; }
    .result-note { margin: 10px 0 0; color: var(--muted-foreground); font-size: 10px; line-height: 1.45; }

    .form-actions { display: flex; flex-wrap: wrap; align-items: flex-end; gap: 10px; }
    .form-actions .field { min-width: min(100%, 210px); flex: 1; }

    .empty { min-height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 9px; padding: 28px; color: var(--muted-foreground); background: #fafcfb; border: 1px dashed var(--border); border-radius: 8px; text-align: center; }
    .empty-icon { width: 42px; height: 42px; display: grid; place-items: center; color: var(--muted-foreground); background: var(--muted); border-radius: 50%; }
    .empty-icon svg { width: 19px; height: 19px; }
    .empty-title { color: #3e4b45; font-size: 12px; font-weight: 650; }
    .empty-note { max-width: 420px; font-size: 11px; line-height: 1.45; }

    .metric-strip { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 10px; }
    .stat { padding: 11px 13px; background: #fafcfb; border: 1px solid var(--border); border-radius: 8px; }
    .stat.highlight { background: var(--primary-faint); border-color: rgba(40, 150, 114, .2); }
    .stat-label { color: var(--muted-foreground); font-size: 11px; }
    .stat-value { margin-top: 4px; color: var(--foreground); font-size: 19px; font-weight: 700; font-variant-numeric: tabular-nums; }
    .stat.highlight .stat-value { color: var(--primary-strong); }
    .stat-note { margin-top: 3px; color: var(--muted-foreground); font-size: 10px; }

    .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; font-size: 11px; }
    th { padding: 10px 12px; color: var(--muted-foreground); background: #f6f8f7; border-bottom: 1px solid var(--border); font-size: 10px; font-weight: 650; letter-spacing: .05em; text-align: left; text-transform: uppercase; white-space: nowrap; }
    td { padding: 11px 12px; border-bottom: 1px solid #e9eeeb; }
    tbody tr:last-child td { border-bottom: 0; }
    tbody tr:hover td { background: #fbfcfb; }
    .num { text-align: right; font-variant-numeric: tabular-nums; }
    .muted { color: var(--muted-foreground); }

    .contractor-list { display: grid; gap: 8px; }
    .contractor-item { overflow: hidden; background: #fbfcfb; border: 1px solid var(--border); border-radius: 8px; }
    .contractor-item[open] { background: white; border-color: rgba(40, 150, 114, .28); box-shadow: 0 2px 10px rgba(27, 53, 43, .04); }
    .contractor-item > summary { display: grid; grid-template-columns: minmax(0, 1fr) auto 18px; align-items: center; gap: 12px; padding: 12px 14px; cursor: pointer; }
    .contractor-item > summary::-webkit-details-marker { display: none; }
    .contractor-item > summary::after { content: "›"; color: var(--primary); font-size: 22px; line-height: 1; text-align: center; transition: transform .16s ease; }
    .contractor-item[open] > summary::after { transform: rotate(90deg); }
    .contractor-item > summary:hover { background: var(--primary-faint); }
    .contractor-item > summary:focus-visible { outline: 3px solid rgba(40, 150, 114, .22); outline-offset: -3px; }
    .contractor-name { min-width: 0; color: var(--foreground); font-size: 12px; font-weight: 650; line-height: 1.35; }
    .contractor-metrics { display: flex; flex-wrap: wrap; justify-content: flex-end; gap: 6px; }
    .metric-inline { display: inline-flex; align-items: center; gap: 4px; min-height: 23px; padding: 3px 8px; color: var(--muted-foreground); background: var(--muted); border-radius: 999px; font-size: 10px; white-space: nowrap; }
    .metric-inline strong { color: #44524c; font-weight: 700; font-variant-numeric: tabular-nums; }
    .contractor-body { padding: 0 14px 14px; border-top: 1px solid var(--border); }
    .contractor-body .table-wrap { margin-top: 12px; }
    .work-code { min-width: 105px; white-space: nowrap; }
    .work-name { min-width: 220px; }

    .directory-toolbar { display: grid; grid-template-columns: minmax(220px, 1fr) 220px; gap: 10px; margin-bottom: 12px; }
    .directory-source { min-width: 210px; color: var(--foreground); font-weight: 600; }
    .directory-canonical { min-width: 260px; }
    .directory-editor { display: grid; grid-template-columns: minmax(170px, 1fr) auto; align-items: center; gap: 7px; }
    .directory-actions { display: flex; flex-wrap: wrap; gap: 6px; }
    .directory-actions .btn { min-height: 30px; padding: 5px 9px; }
    .directory-status { min-width: 120px; }
    .directory-suggestion { display: block; margin-top: 4px; color: var(--muted-foreground); font-size: 10px; }

    .field-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 13px; }
    .field { display: grid; gap: 6px; }
    .field-wide { grid-column: 1 / -1; }
    .field label { color: #44524c; font-size: 11px; font-weight: 600; }
    .input { width: 100%; min-height: 36px; padding: 7px 10px; color: var(--foreground); background: white; border: 1px solid var(--border); border-radius: 7px; font-size: 12px; }
    .input:disabled { color: var(--muted-foreground); background: var(--muted); }

    .edit-only { display: none !important; }
    body.edit-mode .edit-only { display: inline-flex !important; }
    body.edit-mode .edit-only.block { display: flex !important; }
    body.edit-mode .editable-card { border-color: rgba(40, 150, 114, .32); box-shadow: 0 0 0 2px rgba(40, 150, 114, .05); }

    .app-footer { position: relative; z-index: 30; display: flex; align-items: center; justify-content: space-between; gap: 16px; padding: 0 18px; color: var(--muted-foreground); background: rgba(255, 255, 255, .97); border-top: 1px solid var(--border); box-shadow: 0 -3px 14px rgba(27, 53, 43, .04); backdrop-filter: blur(10px); font-size: 11px; }
    .app-footer .status-chip { min-height: 27px; padding: 0 9px; }
    .footer-part { min-width: 0; display: flex; align-items: center; gap: 10px; }
    .footer-center { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .edit-toggle { display: inline-flex; align-items: center; gap: 9px; color: #405048; font-size: 12px; font-weight: 600; user-select: none; cursor: pointer; }
    .edit-toggle input { position: absolute; opacity: 0; pointer-events: none; }
    .switch { width: 36px; height: 20px; position: relative; flex: 0 0 auto; background: #cbd5d0; border-radius: 999px; transition: background .18s; }
    .switch::after { content: ""; position: absolute; top: 3px; left: 3px; width: 14px; height: 14px; background: white; border-radius: 50%; box-shadow: 0 1px 3px rgba(0, 0, 0, .2); transition: transform .18s; }
    .edit-toggle input:checked + .switch { background: var(--primary); }
    .edit-toggle input:checked + .switch::after { transform: translateX(16px); }
    .edit-toggle input:focus-visible + .switch { outline: 3px solid rgba(40, 150, 114, .22); outline-offset: 2px; }

    .toast-region { position: fixed; z-index: 100; top: 70px; right: 18px; display: grid; gap: 8px; pointer-events: none; }
    .toast { width: min(360px, calc(100vw - 36px)); display: flex; align-items: flex-start; gap: 10px; padding: 12px 14px; color: var(--card-foreground); background: var(--card); border: 1px solid var(--border); border-radius: 9px; box-shadow: var(--shadow); animation: toast-in .2s ease-out; pointer-events: auto; }
    .toast svg { width: 17px; height: 17px; flex: 0 0 auto; color: var(--primary); }
    .toast-title { font-size: 12px; font-weight: 650; }
    .toast-note { margin-top: 2px; color: var(--muted-foreground); font-size: 10px; line-height: 1.4; }
    @keyframes toast-in { from { opacity: 0; transform: translateY(-6px); } }

    @media (max-width: 900px) {
      .app-shell { grid-template-rows: 56px auto minmax(0, 1fr) 52px; }
      .workspace { display: contents; }
      .sidebar { width: 100%; max-width: 100vw; overflow: hidden; border-right: 0; border-bottom: 1px solid var(--border); }
      .sidebar-label { display: none; }
      .nav-list { width: 100%; max-width: 100vw; overflow-x: auto; flex-direction: row; padding: 7px 10px; }
      .nav-item { width: auto; min-width: max-content; min-height: 38px; padding: 8px 10px; }
      .nav-text { white-space: nowrap; }
      .content-scroll { min-height: 0; }
      .content { padding: 24px 20px 34px; }
      .grid-3 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .metric-strip { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .mapping-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
      .directory-toolbar { grid-template-columns: minmax(180px, 1fr) 200px; }
      .footer-center { display: none; }
    }

    @media (max-width: 680px) {
      .app-header { padding: 0 12px; }
      .brand-title { font-size: 14px; }
      .header-actions .btn, body.edit-mode .header-actions .btn { display: none !important; }
      .status-chip { max-width: 120px; overflow: hidden; text-overflow: ellipsis; }
      .content { padding: 20px 14px 30px; }
      .page-head { display: grid; }
      .page-actions { justify-content: flex-start; }
      .page-description { margin-left: 0; }
      .banner { flex-wrap: wrap; }
      .banner-action { margin-left: 27px; }
      .grid-2, .grid-3, .field-grid { grid-template-columns: 1fr; }
      .mapping-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .directory-toolbar { grid-template-columns: 1fr; }
      .field-wide { grid-column: auto; }
      .source-overview { grid-template-columns: minmax(60px, 1fr) auto auto auto auto; gap: 6px; padding-inline: 9px; }
      .source-overview-secondary, .source-date-origin { display: none; }
      .metric-strip { grid-template-columns: 1fr; }
      .contractor-item > summary { grid-template-columns: minmax(0, 1fr) 18px; }
      .contractor-metrics { grid-column: 1 / -1; grid-row: 2; justify-content: flex-start; }
      .app-footer { padding: 0 12px; }
      .footer-part:first-child { display: none; }
      .footer-part:last-child { margin-left: auto; }
      .nav-icon { width: 16px; height: 16px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true" data-icon="file-chart"></div>
        <div class="brand-copy">
          <h1 class="brand-title" id="app-title">Отчёт по незавершённому строительству (НЗП)</h1>
          <div class="brand-subtitle">Расчёт и подготовка отчётности</div>
        </div>
      </div>
      <div class="header-actions">
        <button class="btn btn-ghost edit-only" type="button" id="download-config" data-icon-button="download">Скачать config.json</button>
      </div>
    </header>

    <div class="workspace">
      <aside class="sidebar" aria-label="Разделы приложения">
        <div class="sidebar-label">Разделы</div>
        <nav class="nav-list" id="nav-list"></nav>
      </aside>
      <main class="content-scroll" id="main-scroll">
        <div class="content" id="content" aria-live="polite"></div>
      </main>
    </div>

        return normalizeParserLabel(value).replace(/\s*\([^)]*\)\s*$/g, "").replace(/\s*\[[^\]]*\]\s*$/g, "").replace(/[\s._-]*\d+\s*$/g, "").replace(/[^a-zа-яё0-9]+/gi, "");
      }

      function suggestCanonicalContractor(sourceName) {
        var sourceStem = contractorNameStem(sourceName);
        if (!sourceStem) return "";
        return canonicalContractorNames().find(function (name) { return normalizeParserLabel(name) !== normalizeParserLabel(sourceName) && contractorNameStem(name) === sourceStem; }) || "";
      }

      function sourceSummary(source) {
        return (state.kfo.sourceSummaries || []).find(function (entry) { return entry.id === source.id; }) || null;
      }

      function sourceConnection(source) {
        return state.sourceConnections[source.id] || { status: "inactive", checkedAt: null, message: source.url ? "Источник ещё не проверен" : "Ссылка не указана" };
      }

      function connectionSummary(source, index) {
        var connection = sourceConnection(source);
        var summary = sourceSummary(source);
        var active = source.enabled && connection.status === "active";
        var title = !source.enabled ? "Отключён" : (connection.status === "checking" || connection.status === "loading" ? "Проверка…" : (active ? "Активно" : "Нет подключения"));
        var checked = connection.checkedAt ? formatDateTime(connection.checkedAt) : "Проверка ещё не выполнялась";
        var updated = summary && summary.updatedAt ? formatDateShort(summary.updatedAt) : "Не определена";
        var updatedOrigin = summary && summary.updatedAtOrigin ? summary.updatedAtOrigin.replace(/^ячейка\s+/i, "") : "";
        var statusDetails = (connection.message || "Источник данных недоступен") + " · Проверено: " + checked;
        var metric = summary ? '<strong>' + formatNumber(summary.totalRows, 0) + '</strong> строк <span class="source-overview-secondary">· ' + formatNumber(summary.includedRows, 0) + ' с объёмами</span>' : escapeHtml(connection.message || "Сведения ещё не загружены");
        var date = summary && summary.updatedAt ? 'Данные <strong>' + updated + '</strong><span class="source-date-origin"> · ' + escapeHtml(updatedOrigin) + '</span>' : 'Данные <strong>—</strong>';
        var openLink = source.url ? '<a class="source-open-link" href="' + escapeHtml(source.url) + '" target="_blank" rel="noopener noreferrer" aria-label="Открыть файл ' + escapeHtml(source.name) + '">Открыть</a>' : '<span class="source-open-link muted">Нет ссылки</span>';
        var removeButton = state.editMode ? button("Удалить", "", "", 'data-remove-source="' + index + '"') : "";
        return '<div class="source-overview"><div class="source-overview-name">' + escapeHtml(source.name) + '</div><div class="source-status-inline' + (active ? " active" : "") + '" title="' + escapeHtml(statusDetails) + '"><span class="source-status-dot"></span><span>' + title + '</span></div><div class="source-overview-metric">' + metric + '</div><div class="source-overview-date">' + date + '</div><div class="source-overview-actions">' + openLink + removeButton + '</div></div>';
      }

      function renderKfoSourceCard(source, index) {
        var levelOptions = '<option value="inherit"' + (source.kqLevel === "inherit" ? " selected" : "") + '>Выбранный уровень</option><option value="kq1"' + (source.kqLevel === "kq1" ? " selected" : "") + '>KQ-1</option><option value="kq2"' + (source.kqLevel === "kq2" ? " selected" : "") + '>KQ-2</option>';
        var mapping = KFO_COLUMN_FIELDS.map(function (field) {
          return '<div class="field"><label>' + field.label + '</label><input class="input" maxlength="3" value="' + escapeHtml(source.columns[field.key] || "") + '" data-source-index="' + index + '" data-column-key="' + field.key + '" /></div>';
        }).join("");
        var editor = state.editMode
          ? '<div class="source-settings"><div class="field-grid"><div class="field"><label>Наименование источника</label><input class="input" value="' + escapeHtml(source.name) + '" data-source-index="' + index + '" data-source-field="name" /></div><div class="field"><label>Использование</label><select class="input" data-source-index="' + index + '" data-source-field="enabled"><option value="true"' + (source.enabled ? " selected" : "") + '>Включён</option><option value="false"' + (!source.enabled ? " selected" : "") + '>Отключён</option></select></div><div class="field field-wide"><label>Ссылка SharePoint или путь к тестовому файлу</label><input class="input" type="text" placeholder="https://...sharepoint.com/.../БД-КФО.xlsb" value="' + escapeHtml(source.url) + '" data-source-index="' + index + '" data-source-field="url" /></div><div class="field"><label>Лист данных</label><input class="input" value="' + escapeHtml(source.sheetName) + '" data-source-index="' + index + '" data-source-field="sheetName" /></div><div class="field"><label>Ячейка даты обновления</label><input class="input" value="' + escapeHtml(source.updatedAtCell) + '" data-source-index="' + index + '" data-source-field="updatedAtCell" /></div><div class="field"><label>Строк поиска заголовка</label><input class="input" type="number" min="1" max="500" value="' + source.headerSearchRows + '" data-source-index="' + index + '" data-source-field="headerSearchRows" /></div><div class="field"><label>Уровень KQ для файла</label><select class="input" data-source-index="' + index + '" data-source-field="kqLevel">' + levelOptions + '</select></div></div><h5 class="settings-section-title">Колонки для сбора информации</h5><p class="settings-section-note">Все поля доступны для настройки. Заголовки определяются автоматически, указанные буквы используются как резерв.</p><div class="mapping-grid">' + mapping + '</div></div>'
          : "";
        return '<div class="source-card">' + connectionSummary(source, index) + editor + '</div>';
      }

      function formatNumber(value, digits) {
        if (value == null || value === "") return "—";
        var number = Number(value);
        if (!Number.isFinite(number)) return "—";
        return new Intl.NumberFormat("ru-RU", { maximumFractionDigits: digits == null ? 3 : digits }).format(number);
      }

      function workTypeKey(entry) {
        return [normalizeParserLabel(entry.kqCode || entry.kqName || entry.erName), entry.level || ""].join("||");
      }

      function countUniqueWorkTypes(groups) {
        var keys = new Set();
        (groups || []).forEach(function (entry) { keys.add(workTypeKey(entry)); });
        return keys.size;
      }

      function hasDisplayedVolume(entry) {
        return [entry.actualSmr, entry.acceptedSk, entry.acceptedId, entry.evaluatedVolume].some(function (value) {
          if (value == null || value === "") return false;
          var number = Number(value);
          return Number.isFinite(number) && Math.round(number) !== 0;
        });
      }

      function renderKfoResults() {
        var groups = aggregateCanonicalGroups(state.kfo.groups || []).filter(hasDisplayedVolume);
        var contractors = buildContractorSummaries(groups);
        if (state.kfo.status === "loading") return emptyState("Читаем БД КФО", "Большой файл .xlsb обрабатывается в браузере. Не закрывайте страницу.", "database");
        if (!groups.length) return emptyState("Нет ненулевых физических объёмов", state.kfo.message || "Проверьте источники, дату среза и параметры расчёта.", "database");
        var byContractor = new Map();
        groups.forEach(function (entry) {
          var key = normalizeParserLabel(entry.contractor);
          if (!byContractor.has(key)) byContractor.set(key, []);
          byContractor.get(key).push(entry);
        });
        var contractorCards = contractors.map(function (contractor) {
          var workRows = (byContractor.get(normalizeParserLabel(contractor.name)) || []).map(function (entry) {
            return '<tr><td class="work-code"><strong>' + escapeHtml(entry.kqCode) + '</strong></td><td class="work-name">' + escapeHtml(entry.kqName || entry.erName || "Наименование не найдено") + '</td><td>' + escapeHtml(entry.unit) + '</td><td class="num">' + formatNumber(entry.actualSmr, 0) + '</td><td class="num">' + formatNumber(entry.acceptedSk, 0) + '</td><td class="num">' + formatNumber(entry.acceptedId, 0) + '</td><td class="num">' + (entry.evaluatedVolume == null ? "—" : formatNumber(entry.evaluatedVolume, 0)) + '</td></tr>';
          }).join("");
          var coverage = contractor.regulationCoverage == null ? "Регламент не применяется" : "Покрытие ДК " + formatNumber(contractor.regulationCoverage, 0) + "%";
          return '<details class="contractor-item"><summary><span class="contractor-name">' + escapeHtml(contractor.name) + '</span><span class="contractor-metrics"><span class="metric-inline"><strong>' + formatNumber(contractor.workTypes, 0) + '</strong> видов работ</span><span class="metric-inline"><strong>' + formatNumber(contractor.rows, 0) + '</strong> строк с объёмами</span><span class="metric-inline">' + coverage + '</span></span></summary><div class="contractor-body"><div class="table-wrap"><table><thead><tr><th>Шифр KQ</th><th>Наименование работ</th><th>Ед.</th><th class="num">Факт СМР</th><th class="num">Принято СК</th><th class="num">Принято ИД</th><th class="num">Оценка по регламенту</th></tr></thead><tbody>' + workRows + '</tbody></table></div></div></details>';
        }).join("");
        return '<section class="card"><div class="card-header"><h3 class="card-title">Физические объёмы по подрядчикам</h3><p class="card-desc">Выберите подрядчика, чтобы увидеть его виды работ. Нулевые строки скрыты; отображаемые объёмы округлены до целых, расчётная точность сохранена.</p></div><div class="card-body"><div class="contractor-list">' + contractorCards + '</div><p class="result-note">Факт СМР, Принято СК и Принято ИД рассчитываются без регламентов: исходный объём умножается только на коэффициент выбранного уровня KQ. Оценка по регламенту формируется отдельно по данным раздела «Регламенты»; без подключённого источника её значение равно 0.</p></div></section>';
      }

      function renderDataUpload(item) {
        var sources = getKfoSources();
        var sourceCards = sources.length ? sources.map(renderKfoSourceCard).join("") : emptyState("Источники не настроены", "Включите режим редактирования и добавьте ссылку на БД КФО.", "database");
        var kfo = state.kfo;
        var visibleGroups = aggregateCanonicalGroups(kfo.groups || []).filter(hasDisplayedVolume);
        var visibleContractors = buildContractorSummaries(visibleGroups);
        var workTypes = countUniqueWorkTypes(visibleGroups);
        var pendingContractorCount = contractorDirectoryRows().filter(function (row) { return row.detected && !row.entry; }).length;
        var directoryAlert = kfo.status === "active" && pendingContractorCount
          ? '<div class="banner warning">' + icon("info") + '<div><strong>' + formatNumber(pendingContractorCount, 0) + ' подрядчиков отсутствуют в справочнике.</strong> Объёмы не потеряны и временно показаны под исходными наименованиями. Выполните акцепт перед выпуском отчёта.</div>' + button("Открыть справочник", "users", "banner-action", 'id="open-contractor-directory"') + '</div>'
          : "";
        return pageHead(item) +
          '<div class="stack">' +
            directoryAlert +
            '<section class="card editable-card"><div class="card-header"><div class="card-title-row"><h3 class="card-title">Источники БД КФО</h3><span class="badge">Источников: ' + formatNumber(sources.length, 0) + '</span></div><p class="card-desc">Ссылка открывает файл-источник. Состояние подключения и происхождение дат показаны отдельно.</p></div><div class="card-body"><div class="source-grid">' + sourceCards + '</div></div><div class="card-footer edit-only block">' + button("Добавить источник", "plus", "", 'id="add-kfo-source"') + '</div></section>' +
            '<section class="card"><div class="card-header"><div class="card-title-row"><h3 class="card-title">Срез и способ расчёта</h3><span class="badge">На ' + formatDateShort(state.asOfDate) + '</span></div><p class="card-desc">Дата ограничивает строки по дате записи; факт СМР с более поздней датой последнего факта исключается. Для СК и ИД отдельных дат в книге нет, поэтому точный исторический откат этих этапов требует отдельного файла-среза. Регламентные коэффициенты не изменяют значения этапов и учитываются только в итоговой колонке оценки.</p></div><div class="card-body"><div class="form-actions"><div class="field"><label for="as-of-date">Дата сведений</label><input class="input" id="as-of-date" type="date" value="' + escapeHtml(state.asOfDate) + '" /></div><div class="field"><label for="kq-level">Уровень расчёта</label><select class="input" id="kq-level"><option value="kq1"' + (state.kqLevel === "kq1" ? " selected" : "") + '>KQ-1</option><option value="kq2"' + (state.kqLevel === "kq2" ? " selected" : "") + '>KQ-2</option></select></div>' + button("Обновить сведения", "refresh", "btn-primary", 'id="refresh-kfo-data"') + '</div></div></section>' +
            '<section class="card"><div class="card-header"><h3 class="card-title">Ключевые показатели</h3><p class="card-desc">Краткая оценка состава загруженных сведений без суммирования разных единиц измерения.</p></div><div class="card-body"><div class="metric-strip"><div class="stat"><div class="stat-label">Подрядчиков</div><div class="stat-value">' + (kfo.status === "active" ? formatNumber(visibleContractors.length, 0) : "—") + '</div><div class="stat-note">с ненулевыми объёмами</div></div><div class="stat highlight"><div class="stat-label">Строк для анализа</div><div class="stat-value">' + (kfo.status === "active" ? formatNumber(kfo.totalRows, 0) : "—") + '</div><div class="stat-note">' + (kfo.status === "active" ? formatNumber(kfo.includedRows, 0) + ' с ненулевыми объёмами' : 'ожидается загрузка') + '</div></div><div class="stat"><div class="stat-label">Видов работ</div><div class="stat-value">' + (kfo.status === "active" ? formatNumber(workTypes, 0) : "—") + '</div><div class="stat-note">уникальные коды выбранного KQ</div></div></div></div></section>' +
            renderKfoResults() +
          '</div>';
      }

      function renderContractorDirectory(item) {
        var rows = contractorDirectoryRows();
        var pending = rows.filter(function (row) { return row.detected && !row.entry; });
        var canonicalNames = canonicalContractorNames();
        var canonicalCount = canonicalContractorNames().length;
        var detectedCount = (state.kfo.rawContractors || []).length;
        var options = canonicalNames.map(function (name) { return '<option value="' + escapeHtml(name) + '"></option>'; }).join("");
        var tableRows = rows.map(function (row) {
          var entry = row.entry;
          var status = !entry ? "pending" : entry.status;
          var statusLabel = status === "pending" ? "Требует акцепта" : (status === "canonical" ? "Канонический" : "Объединён");
          var statusClass = status === "pending" ? "warning" : "green";
          var suggestion = !entry ? suggestCanonicalContractor(row.sourceName) : "";
          var canonicalValue = entry ? entry.canonicalName : suggestion;
          var kfoStatus = row.detected
            ? '<span class="badge green">Подтверждено</span>'
            : '<span class="badge">Нет в текущем срезе</span>';
          var canonicalCell = state.editMode
            ? '<div class="directory-editor"><input class="input" list="contractor-canonical-options" value="' + escapeHtml(canonicalValue) + '" aria-label="Каноническое наименование для ' + escapeHtml(row.sourceName) + '" data-contractor-input="' + escapeHtml(row.sourceName) + '" /><div class="directory-actions">' + button("Сохранить", "check", status === "pending" ? "btn-primary" : "", 'data-save-contractor="' + escapeHtml(row.sourceName) + '"') + button("Канонический", "", "", 'data-canonical-contractor="' + escapeHtml(row.sourceName) + '"') + (entry ? button("Удалить", "", "btn-ghost", 'data-remove-contractor="' + escapeHtml(row.sourceName) + '"') : "") + '</div></div>' + (suggestion ? '<span class="directory-suggestion">Предложено по совпадению основы: ' + escapeHtml(suggestion) + '</span>' : "")
            : (entry ? '<strong>' + escapeHtml(entry.canonicalName) + '</strong>' : '<span class="muted">Не определено</span>');
          return '<tr data-directory-status="' + status + '" data-directory-search="' + escapeHtml(normalizeParserLabel(row.sourceName + " " + (entry ? entry.canonicalName : ""))) + '"><td class="directory-source">' + escapeHtml(row.sourceName) + '</td><td class="directory-status">' + kfoStatus + '</td><td class="num">' + (row.detected ? formatNumber(row.rows, 0) : "—") + '</td><td class="directory-status"><span class="badge ' + statusClass + '">' + statusLabel + '</span></td><td class="directory-canonical">' + canonicalCell + '</td></tr>';
        }).join("");
        var locked = state.editMode ? "" : '<div class="banner warning">' + icon("lock") + '<div>Для акцепта включите <strong>режим редактирования</strong>. Изменения сохраняются в общем config.json и не зависят от браузера конкретного пользователя.</div></div>';
        var warning = pending.length
          ? '<div class="banner warning">' + icon("info") + '<div><strong>Новых подрядчиков: ' + formatNumber(pending.length, 0) + '.</strong> Для каждого выберите существующее каноническое наименование либо отметьте исходное наименование как каноническое.</div></div>'
          : '<div class="banner">' + icon("check") + '<div>Все подрядчики текущей БД КФО акцептованы. Расчёт выполняется по исходным строкам, а объединение применяется после расчёта.</div></div>';
        var body = rows.length
          ? '<div class="directory-toolbar"><div class="field"><label for="directory-search">Поиск подрядчика</label><input class="input" id="directory-search" type="search" placeholder="Исходное или каноническое наименование" value="' + escapeHtml(state.directorySearch) + '" /></div><div class="field"><label for="directory-filter">Статус</label><select class="input" id="directory-filter"><option value="all"' + (state.directoryFilter === "all" ? " selected" : "") + '>Все</option><option value="pending"' + (state.directoryFilter === "pending" ? " selected" : "") + '>Требуют акцепта</option><option value="canonical"' + (state.directoryFilter === "canonical" ? " selected" : "") + '>Канонические</option><option value="alias"' + (state.directoryFilter === "alias" ? " selected" : "") + '>Объединённые</option></select></div></div><datalist id="contractor-canonical-options">' + options + '</datalist><div class="table-wrap"><table><thead><tr><th>Наименование в БД КФО</th><th>Статус БД КФО</th><th class="num">Строк</th><th>Статус</th><th>Канонический подрядчик</th></tr></thead><tbody id="contractor-directory-body">' + tableRows + '</tbody></table></div><p class="result-note">После акцепта скачайте обновлённый config.json и разместите его в общем источнике. Тогда соответствия будут одинаковыми для всех пользователей.</p>'
          : emptyState("Подрядчики ещё не обнаружены", "Нажмите «Сверить с БД КФО», чтобы прочитать актуальный файл и сформировать список для акцепта.", "users");
        return pageHead(item, button("Сверить с БД КФО", "refresh", "", 'id="sync-contractors"') + button("Скачать config.json", "download", "btn-primary edit-only", 'id="directory-download"')) +
          '<div class="stack">' + locked + warning + '<div class="metric-strip"><div class="stat"><div class="stat-label">Наименований в БД КФО</div><div class="stat-value">' + (state.kfo.status === "active" ? formatNumber(detectedCount, 0) : "—") + '</div><div class="stat-note">уникальные исходные значения</div></div><div class="stat"><div class="stat-label">Канонических подрядчиков</div><div class="stat-value">' + formatNumber(canonicalCount, 0) + '</div><div class="stat-note">единые группы для отчёта</div></div><div class="stat ' + (pending.length ? "" : "highlight") + '"><div class="stat-label">Требуют акцепта</div><div class="stat-value">' + (state.kfo.status === "active" ? formatNumber(pending.length, 0) : "—") + '</div><div class="stat-note">обнаружены в текущей базе</div></div></div>' +
          '<section class="card editable-card"><div class="card-header"><div class="card-title-row"><h3 class="card-title">Общий справочник подрядчиков</h3><span class="badge green">config.json</span></div><p class="card-desc">Исходные наименования сохраняются для аудита. Каноническое наименование используется только при последующей группировке рассчитанных объёмов.</p></div><div class="card-body">' + body + '</div></section></div>';
      }

      function renderCoefficients(item) {
        return pageHead(item, button("Загрузить регламент", "upload", "edit-only", 'data-demo-action="load-coefficients"')) +
          '<div class="stack"><div class="grid-3"><div class="stat"><div class="stat-label">Регламентов</div><div class="stat-value">0</div><div class="stat-note">файлы не загружены</div></div><div class="stat"><div class="stat-label">Привязок</div><div class="stat-value">0</div><div class="stat-note">к контрагентам</div></div><div class="stat highlight"><div class="stat-label">Покрытие</div><div class="stat-value">0%</div><div class="stat-note">ожидается настройка</div></div></div>' +
          '<section class="card editable-card"><div class="card-header"><div class="card-title-row"><h3 class="card-title">Матрица регламентов</h3><span class="badge">Нет источника</span></div><p class="card-desc">После подключения здесь появятся коэффициенты оценки для этапов Факт СМР, Принято СК и Принято ИД.</p></div><div class="card-body">' + emptyState("Источник регламентов не подключён", "До подключения источника колонка «Оценка по регламенту» во всех расчётах равна 0.", "sliders") + '</div></section></div>';
      }

      function renderPricing(item) {
        return pageHead(item, button("Добавить базу расценок", "plus", "edit-only", 'data-demo-action="add-pricing"')) +
          '<div class="stack"><div class="banner">' + icon("info") + '<div>Расценки сопоставляются с видами работ после загрузки объёмов и справочника укрупнения.</div></div><div class="grid-2">' +
          '<section class="card editable-card"><div class="card-header"><h3 class="card-title">База расценок</h3><p class="card-desc">Файл со стоимостью единицы работ и материалов.</p></div><div class="card-body">' + emptyState("База не подключена", "Добавьте ссылку SharePoint или выберите локальный файл.", "calculator") + '</div></section>' +
          '<section class="card"><div class="card-header"><h3 class="card-title">Привязка контрагентов</h3><p class="card-desc">Индивидуальные базы и соответствия колонок.</p></div><div class="card-body">' + emptyState("Контрагенты не определены", "Сначала загрузите исходные объёмы работ.", "database") + '</div></section></div></div>';
      }

      function renderAggregation(item) {
        var entries = state.aggregation.entries || [];
        var runtimeConfig = state.aggregation.parserConfig;
        var aggregationQuery = normalizeParserLabel(state.aggregationSearch);
        var filteredEntries = aggregationQuery ? entries.filter(function (entry) {
          var searchableKq1 = runtimeConfig ? getEffectiveAggregationGroup("kq1", entry.kq1Code, entry.kq1Name, runtimeConfig).code : entry.kq1Code;
          var searchableKq2 = runtimeConfig ? getEffectiveAggregationGroup("kq2", entry.kq2Code, entry.kq2Name, runtimeConfig).code : entry.kq2Code;

      function saveContractorMapping(sourceName, canonicalName) {
        if (!state.editMode) return;
        sourceName = String(sourceName || "").trim();
        canonicalName = String(canonicalName || "").trim();
        if (!sourceName || !canonicalName) {
          showToast("Наименование не указано", "Выберите существующего канонического подрядчика или введите новое наименование.");
          return;
        }
        var directory = getContractorDirectory();
        var sourceKey = normalizeParserLabel(sourceName);
        var canonicalKey = normalizeParserLabel(canonicalName);
        var canonicalExists = directory.entries.some(function (entry) { return normalizeParserLabel(entry.sourceName) === canonicalKey && normalizeParserLabel(entry.canonicalName) === canonicalKey; });
        if (!canonicalExists) directory.entries.push({ sourceName: canonicalName, canonicalName: canonicalName, status: "canonical" });
        var existing = directory.entries.find(function (entry) { return normalizeParserLabel(entry.sourceName) === sourceKey; });
        if (existing && existing.status === "canonical" && sourceKey !== canonicalKey) {
          directory.entries.forEach(function (entry) {
            if (normalizeParserLabel(entry.canonicalName) === sourceKey) {
              entry.canonicalName = canonicalName;
              entry.status = normalizeParserLabel(entry.sourceName) === canonicalKey ? "canonical" : "alias";
            }
          });
        }
        if (existing) {
          existing.sourceName = sourceName;
          existing.canonicalName = canonicalName;
          existing.status = sourceKey === canonicalKey ? "canonical" : "alias";
        } else {
          directory.entries.push({ sourceName: sourceName, canonicalName: canonicalName, status: sourceKey === canonicalKey ? "canonical" : "alias" });
        }
        state.config.contractorDirectory = normalizeContractorDirectory(directory);
        state.configDirty = true;
        state.kfo.contractors = buildContractorSummaries(aggregateCanonicalGroups(state.kfo.groups || []));
        applyConfigToChrome();
        renderContent();
        showToast("Подрядчик акцептован", sourceName === canonicalName ? "Наименование отмечено как каноническое." : sourceName + " объединён с " + canonicalName + ".");
      }

      function removeContractorMapping(sourceName) {
        if (!state.editMode) return;
        var directory = getContractorDirectory();
        var sourceKey = normalizeParserLabel(sourceName);
        var existing = directory.entries.find(function (entry) { return normalizeParserLabel(entry.sourceName) === sourceKey; });
        if (!existing) return;
        if (existing.status === "canonical") {
          var aliases = directory.entries.filter(function (entry) { return normalizeParserLabel(entry.canonicalName) === sourceKey && normalizeParserLabel(entry.sourceName) !== sourceKey; });
          if (aliases.length) {
            showToast("Удаление невозможно", "Сначала переназначьте " + aliases.length + " связанных наименований.");
            return;
          }
        }
        directory.entries = directory.entries.filter(function (entry) { return normalizeParserLabel(entry.sourceName) !== sourceKey; });
        state.config.contractorDirectory = normalizeContractorDirectory(directory);
        state.configDirty = true;
        state.kfo.contractors = buildContractorSummaries(aggregateCanonicalGroups(state.kfo.groups || []));

        renderContent();
        showToast("Соответствие удалено", sourceName + " снова требует акцепта при наличии в БД КФО.");
